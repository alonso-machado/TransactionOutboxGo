name: CI - notification-consumer-worker

# Independent of the other microservices' workflows on purpose — see
# .github/workflows/README.md for why each service gets its own workflow file
# rather than one matrixed workflow. Gate order: build -> lint -> unit-tests -> upload.
# integration-tests is an optional, flag-gated safety measure off the gate
# path — it never blocks upload. Deploy is manual (Helm) for now.
on:
  push:
    branches: [main]
    paths:
      - "internal/**"
      - "cmd/notification-consumer-worker/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/notification-consumer-worker.yml"
  pull_request:
    paths:
      - "internal/**"
      - "cmd/notification-consumer-worker/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/notification-consumer-worker.yml"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run the TestContainers integration suite (safety measure only — never blocks this pipeline)"
        type: boolean
        default: false

env:
  GO_VERSION: "1.26"
  SERVICE: notification-consumer-worker

jobs:
  build:
    name: build (gate 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./cmd/${{ env.SERVICE }}/... ./internal/...

  lint:
    name: lint (gate 2)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
      # Lints the workflow YAML itself (this file included) — catches a
      # broken pipeline the same way golangci-lint catches broken Go.
      - uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_level: error
      # Lints the Helm chart this service belongs to.
      - uses: azure/setup-helm@v4
      - run: helm lint helmcharts/transaction-outbox
      - run: helm lint helmcharts/transaction-outbox --set canary.enabled=true
      # Go vulnerability scan (Phase 8, closing Phase 7's Part F) — checks
      # go.sum's dependency tree against the official Go vulnerability
      # database for CVEs actually reachable from this code's call graph,
      # not just "a vulnerable version is present in go.sum".
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  unit-tests:
    name: unit-tests (gate 3)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -race ./internal/...

  # Optional, flag-gated safety measure — needs unit-tests to reuse the gate
  # result, but nothing downstream needs this job, so it can be skipped or
  # fail without blocking upload. Off by default: only runs when explicitly
  # requested via workflow_dispatch or a PR label.
  integration-tests:
    name: integration-tests (optional, non-blocking)
    needs: unit-tests
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_integration) ||
      contains(github.event.pull_request.labels.*.name, 'ci:integration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -tags=integration -race -timeout=300s ./tests/integration/...

  upload:
    name: upload image (ECR + Docker Hub mirror)
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC auth to AWS — no long-lived AWS keys in this repo
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ env.SERVICE }}
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE }}:${{ github.sha }}

      # Secondary mirror — only runs if Docker Hub credentials are configured.
      - uses: docker/login-action@v3
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ env.SERVICE }}
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.SERVICE }}:${{ github.sha }}

  # No automated deploy job: Helm + KIND is the deploy/test path, run
  # manually (`make k8s-apply`).
