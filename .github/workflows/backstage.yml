name: CI - backstage

# Independent of the six Go microservices' workflows on purpose — see
# .github/workflows/README.md for why each service gets its own workflow
# file rather than one matrixed workflow. Same gate order as the Go
# services (build -> lint -> unit-tests -> upload), Node/Yarn tooling
# instead of Go — see .claude/plan-phase9-backstage.md.
on:
  push:
    branches: [main]
    paths:
      - "backstage/**"
      - "catalog-info.yaml"
      - "mkdocs.yml"
      - "docs/index.md"
      - ".github/workflows/backstage.yml"
  pull_request:
    paths:
      - "backstage/**"
      - "catalog-info.yaml"
      - "mkdocs.yml"
      - "docs/index.md"
      - ".github/workflows/backstage.yml"

env:
  SERVICE: backstage

jobs:
  build:
    name: build (gate 1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backstage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn tsc

  lint:
    name: lint (gate 2)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
        working-directory: backstage
      - run: yarn install --immutable
        working-directory: backstage
      - run: yarn lint:all
        working-directory: backstage
      # Lints the workflow YAML itself (this file included) — same as every
      # other workflow in this repo.
      - uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_level: error
      # Lints the Helm chart backstage/templates/backstage/ was added to.
      - uses: azure/setup-helm@v4
      - run: helm lint helmcharts/transaction-outbox

  unit-tests:
    name: unit-tests (gate 3)
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backstage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test:all

  upload:
    name: upload image (ECR + Docker Hub mirror)
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for OIDC auth to AWS — no long-lived AWS keys in this repo
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/build-push-action@v6
        with:
          context: backstage
          file: backstage/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.SERVICE }}:${{ github.sha }}

      # Secondary mirror — only runs if Docker Hub credentials are configured.
      - uses: docker/login-action@v3
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        with:
          context: backstage
          file: backstage/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.SERVICE }}:${{ github.sha }}

  # No automated deploy job: Helm + KIND is the deploy/test path, run
  # manually (`make k8s-apply`).
