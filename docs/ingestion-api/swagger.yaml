basePath: /
definitions:
  internal_adapter_http.CustomerDTO:
    properties:
      document:
        type: string
      email:
        type: string
      name:
        type: string
    type: object
  internal_adapter_http.OrderRequestDTO:
    properties:
      customer:
        $ref: '#/definitions/internal_adapter_http.CustomerDTO'
      eventId:
        type: string
      eventName:
        type: string
      eventSubtype:
        type: string
      eventType:
        type: string
      sourceOrderId:
        type: string
      tickets:
        items:
          $ref: '#/definitions/internal_adapter_http.TicketItemDTO'
        type: array
      venue:
        $ref: '#/definitions/internal_adapter_http.VenueDTO'
    type: object
  internal_adapter_http.OrderResponseDTO:
    properties:
      idempotencyKey:
        type: string
      orderId:
        type: string
      status:
        description: '"accepted" | "duplicate"'
        type: string
    type: object
  internal_adapter_http.TicketItemDTO:
    properties:
      currency:
        type: string
      id:
        type: string
      price:
        type: number
      row:
        type: string
      seat:
        type: string
      section:
        type: string
    type: object
  internal_adapter_http.VenueDTO:
    properties:
      city:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  description: |-
    Accepts ticket orders and payment-gateway webhook confirmations, durably storing
    both in the transactional outbox for asynchronous relay to RabbitMQ.
  title: Transaction Outbox — Event Ticket System Ingestion API
  version: "1.0"
paths:
  /api/v1/orders:
    post:
      consumes:
      - application/json
      description: |-
        Accepts a request for tickets to an Event, durably stores it in the order outbox
        for asynchronous relay to RabbitMQ (routed by eventType/eventSubtype). Idempotent on
        the derived idempotency key (sourceOrderId + optional Idempotency-Key header).
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Ticket order payload
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/internal_adapter_http.OrderRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_adapter_http.OrderResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Place a ticket order
      tags:
      - orders
  /api/v1/webhooks/payments/{provider}:
    post:
      consumes:
      - application/json
      description: |-
        Verifies the gateway's signature and lands the confirmation in payment_event_outbox
        for asynchronous relay to fulfillment-consumer-worker. Idempotent on the gateway's own event id.
      parameters:
      - description: Configured gateway provider name (e.g. stripe, fake)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Receive a payment-gateway webhook
      tags:
      - webhooks
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
swagger: "2.0"
