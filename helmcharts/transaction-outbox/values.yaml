namespace: transaction-outbox

image:
  ingestionApi: transaction-outbox-go/ingestion-api:latest
  consumerWorker: transaction-outbox-go/consumer-worker:latest

# Non-sensitive configuration shared by ingestion-api and consumer-worker,
# rendered verbatim into the transaction-outbox-config ConfigMap.
configMap:
  data:
    # ── ingestion-api ──────────────────────────────────────────────────────
    HTTP_PORT: "8080"
    OUTBOX_DISPATCH_INTERVAL_MS: "500"
    OUTBOX_DISPATCH_BATCH_SIZE: "50"
    OUTBOX_MAX_RETRIES: "5"
    OUTBOX_PRUNE_AFTER_HOURS: "48"

    # ── consumer-worker ─────────────────────────────────────────────────────
    PREFETCH_COUNT: "10"
    MAX_DELIVERIES: "5"

    # ── Observability (Phase 2 Track 1 — OpenTelemetry) ─────────────────────
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    OTEL_SERVICE_NAME: "transaction-outbox"
    # Default for ingestion-api. Each per-method consumer-worker Deployment
    # (templates/consumer-worker/deployment.yaml) overrides this via its own
    # env: entry — explicit env: takes precedence over envFrom: on a key
    # collision, so this default never reaches those pods.
    METRICS_PORT: "9090"

    # ── API docs (Phase 2 Track 2 — Swagger) ────────────────────────────────
    # Disabled in production; enable only in lower environments via override.
    SWAGGER_ENABLED: "false"

    # ── Messaging topology ───────────────────────────────────────────────────
    RABBITMQ_MANAGEMENT_URL: "http://rabbitmq:15672"

# PLACEHOLDER — do NOT use these values in any real environment. Real
# DATABASE_URL / RABBITMQ_URL are injected by CI/CD (GitHub Actions secrets,
# HashiCorp Vault, Sealed Secrets, etc.) at deploy time via
# `--set secret.databaseUrl=... --set secret.rabbitmqUrl=...` or a values
# override file — never commit real connection strings here. Plaintext here;
# templates/secret.yaml base64-encodes them.
secret:
  databaseUrl: "CHANGE_ME"
  rabbitmqUrl: "CHANGE_ME"

# Argo Rollouts canary (Phase 4 Track 4). Off by default — Argo Rollouts'
# CRDs/controller don't exist in plain docker-compose or a bare cluster, so
# with this false the chart renders plain Deployments/HPA exactly as before.
# The cloud target (infra/pulumi/workloads.go) sets this true via --set.
canary:
  enabled: false
  ingestionApi:
    # Manual at the start, then time-gated — see .claude/plan-phase4.md Track 4.
    # setWeight 0 + an indefinite pause is what makes every deploy land at 0%
    # and wait; the canary:true header (ingress-canary-header.yaml) routes to
    # it regardless of weight, so it's testable even while paused at 0%.
    promotionStepDuration: 20m
    analysis:
      # Background AnalysisTemplate query — Track 3's Prometheus, scoped to
      # this Rollout's canary Service. Auto-aborts if the canary's 5xx ratio
      # exceeds this threshold.
      prometheusAddress: "http://prometheus.transaction-outbox.svc.cluster.local:9090"
      errorRateThreshold: "0.05"
      interval: 1m
  consumerWorker:
    # After 1h sitting at 5% with no manual action, skip straight to 100% —
    # no 20/50 intermediate steps (see plan doc for why).
    soakDuration: 1h

ingestionApi:
  replicas: 1
  # Empty by default (schedules on any node) — the cloud target
  # (infra/pulumi/workloads.go) overrides this to pin ingestion-api pods to
  # its own dedicated node group, separate from consumer-worker's.
  nodeSelector: {}
  service:
    type: ClusterIP
    annotations: {}
  # ALB Ingress (Phase 4 Track 1's front-door change, also Track 4's
  # prerequisite for request-weighted canary splitting). False locally/bare
  # clusters where the AWS Load Balancer Controller isn't installed.
  ingress:
    enabled: false
    wafAclArn: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 10
    cpuUtilization: 70
    memoryUtilization: 80

consumerWorker:
  # Empty by default — the cloud target (infra/pulumi/workloads.go)
  # overrides this to pin consumer-worker pods to its own dedicated node
  # group, separate from ingestion-api's.
  nodeSelector: {}
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  keda:
    minReplicaCount: 0 # scale to zero when idle
    maxReplicaCount: 10
    pollingInterval: 15 # seconds between queue checks
    cooldownPeriod: 60 # seconds to wait before scaling down
    queueLengthValue: "1000" # 1 replica per 1000 messages

# One Deployment + one KEDA ScaledObject is rendered per entry (see
# templates/consumer-worker/). Adding a 6th payment method is a one-line
# change here — no new template files needed.
paymentMethods:
  - name: pix
    queue: payments.pix.queue
    metricsPort: 9091
  - name: boleto
    queue: payments.boleto.queue
    metricsPort: 9092
  - name: transfer
    queue: payments.transfer.queue
    metricsPort: 9093
  - name: cartao-credito
    queue: payments.cartao_credito.queue
    metricsPort: 9094
  - name: cartao-debito
    queue: payments.cartao_debito.queue
    metricsPort: 9095
