namespace: transaction-outbox

image:
  ingestionApi: transaction-outbox-go/ingestion-api:latest
  consumerWorker: transaction-outbox-go/consumer-worker:latest

# Non-sensitive configuration shared by ingestion-api and consumer-worker,
# rendered verbatim into the transaction-outbox-config ConfigMap.
configMap:
  data:
    # ── ingestion-api ──────────────────────────────────────────────────────
    HTTP_PORT: "8080"
    OUTBOX_DISPATCH_INTERVAL_MS: "250"
    OUTBOX_DISPATCH_BATCH_SIZE: "50"
    OUTBOX_MAX_RETRIES: "5"
    OUTBOX_PRUNE_AFTER_HOURS: "48"

    # ── consumer-worker ─────────────────────────────────────────────────────
    PREFETCH_COUNT: "10"
    MAX_DELIVERIES: "5"

    # ── Observability (Phase 2 Track 1 — OpenTelemetry) ─────────────────────
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    OTEL_SERVICE_NAME: "transaction-outbox"
    # Default for ingestion-api. Each per-method consumer-worker Deployment
    # (templates/consumer-worker/deployment.yaml) overrides this via its own
    # env: entry — explicit env: takes precedence over envFrom: on a key
    # collision, so this default never reaches those pods.
    METRICS_PORT: "9090"

    # ── API docs (Phase 2 Track 2 — Swagger) ────────────────────────────────
    # Disabled in production; enable only in lower environments via override.
    SWAGGER_ENABLED: "false"

    # ── Messaging topology ───────────────────────────────────────────────────
    RABBITMQ_MANAGEMENT_URL: "http://rabbitmq:15672"

    # ── PCI-DSS encryption-in-transit (Phase 5 Track 5.B) ───────────────────
    # Cloud (RDS/Amazon MQ) enforces TLS; the Pulumi values override
    # (infra/pulumi/workloads.go) sets these true/"require" for the cloud
    # target. Default here matches the plaintext local/compose posture.
    DB_SSL_MODE: "disable"
    RABBITMQ_TLS: "false"

# PLACEHOLDER — do NOT use these values in any real environment. Real
# DATABASE_URL / RABBITMQ_URL are injected by CI/CD (GitHub Actions secrets,
# HashiCorp Vault, Sealed Secrets, etc.) at deploy time via
# `--set secret.databaseUrl=... --set secret.rabbitmqUrl=...` or a values
# override file — never commit real connection strings here. Plaintext here;
# templates/secret.yaml base64-encodes them.
#
# Phase 5 Track 3.B convention: when pgbouncer.enabled is true,
# secret.databaseUrl should point at the in-cluster PgBouncer Service
# (postgres://<user>:<pass>@pgbouncer.{{ .Values.namespace }}.svc.cluster.local:6432/<db>)
# instead of RDS directly — pgbouncer.upstreamHost/.upstreamPort below is
# where the *real* Postgres/RDS endpoint goes, kept separate from the app's
# own DATABASE_URL so PgBouncer is genuinely in front of, not bypassed by,
# every consumer/ingestion-api connection.
secret:
  databaseUrl: "CHANGE_ME"
  rabbitmqUrl: "CHANGE_ME"

# External Secrets Operator (Phase 5 Track 5.A). False by default — local/
# compose and any bare cluster without ESO installed keep using the static
# Secret above (templates/secret.yaml). The cloud target
# (infra/pulumi/workloads.go, after infra/pulumi/externalsecrets.go installs
# ESO + its IRSA role) sets this true and supplies region/the two Secrets
# Manager entry names ESO's ExternalSecret CR (templates/externalsecret.yaml)
# syncs from — see infra/pulumi/data.go for where those entries are created
# and populated.
externalSecrets:
  enabled: false
  region: "us-east-1"
  databaseSecretName: "transaction-outbox/dev/database-url"
  rabbitmqSecretName: "transaction-outbox/dev/rabbitmq-url"

# Phase 5 Track 3.B/3.C — PgBouncer (transaction-pooling mode) + its
# pgbouncer-exporter sidecar, in front of RDS. Mirrors docker-compose.yml's
# pgbouncer/pgbouncer-exporter services so local and cloud behave
# identically. Disabled by default so existing deployments aren't forced
# into the pooler topology change without an explicit opt-in; the cloud
# target (infra/pulumi) sets this true.
pgbouncer:
  enabled: false
  replicas: 1
  image: "edoburu/pgbouncer:latest"
  # The real Postgres/RDS endpoint PgBouncer pools connections to — set this
  # to the RDS instance's endpoint (infra/pulumi/data.go) in the cloud
  # values override; "postgres" only resolves locally via compose, kept here
  # purely as a documented default.
  upstreamHost: "postgres"
  upstreamPort: 5432
  authType: scram-sha-256
  adminUser: "outbox"
  maxClientConn: 1000
  defaultPoolSize: 25
  # PLACEHOLDER — base64-decoded contents of userlist.txt
  # ("\"user\" \"password\"" lines); inject via
  # --set pgbouncer.userlist=... at deploy time, never commit real
  # credentials. See observability/pgbouncer/pgbouncer.ini's comment on the
  # plain-vs-scram-sha-256 tradeoff for how the password must be shaped.
  userlist: "CHANGE_ME"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  exporter:
    image: "quay.io/prometheuscommunity/pgbouncer-exporter:latest"
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"
  # PLACEHOLDER — postgres://<admin_user>:<password>@pgbouncer:6432/pgbouncer?sslmode=disable
  exporterDsn: "CHANGE_ME"

# Argo Rollouts canary (Phase 4 Track 4). Off by default — Argo Rollouts'
# CRDs/controller don't exist in plain docker-compose or a bare cluster, so
# with this false the chart renders plain Deployments/HPA exactly as before.
# The cloud target (infra/pulumi/workloads.go) sets this true via --set.
canary:
  enabled: false
  ingestionApi:
    # Manual at the start, then time-gated — see .claude/plan-phase4.md Track 4.
    # setWeight 0 + an indefinite pause is what makes every deploy land at 0%
    # and wait; the canary:true header (ingress-canary-header.yaml) routes to
    # it regardless of weight, so it's testable even while paused at 0%.
    promotionStepDuration: 20m
    analysis:
      # Background AnalysisTemplate query — Track 3's Prometheus, scoped to
      # this Rollout's canary Service. Auto-aborts if the canary's 5xx ratio
      # exceeds this threshold.
      prometheusAddress: "http://prometheus.transaction-outbox.svc.cluster.local:9090"
      errorRateThreshold: "0.05"
      interval: 1m
  consumerWorker:
    # After 1h sitting at 5% with no manual action, skip straight to 100% —
    # no 20/50 intermediate steps (see plan doc for why).
    soakDuration: 1h

ingestionApi:
  replicas: 1
  # Empty by default (schedules on any node) — the cloud target
  # (infra/pulumi/workloads.go) overrides this to pin ingestion-api pods to
  # its own dedicated node group, separate from consumer-worker's.
  nodeSelector: {}
  service:
    type: ClusterIP
    annotations: {}
  # ALB Ingress (Phase 4 Track 1's front-door change, also Track 4's
  # prerequisite for request-weighted canary splitting). False locally/bare
  # clusters where the AWS Load Balancer Controller isn't installed.
  ingress:
    enabled: false
    wafAclArn: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 10
    cpuUtilization: 70
    memoryUtilization: 80
    # 0 — scale up on the very next HPA sync, no waiting. 30 — hold a scale-up
    # for at least this long before scaling back down, so a load spike that
    # drains in a few seconds doesn't immediately give the replica back.
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

consumerWorker:
  # Empty by default — the cloud target (infra/pulumi/workloads.go)
  # overrides this to pin consumer-worker pods to its own dedicated node
  # group, separate from ingestion-api's.
  nodeSelector: {}
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  keda:
    minReplicaCount: 0 # scale to zero when idle
    maxReplicaCount: 10
    pollingInterval: 15 # seconds between queue checks
    cooldownPeriod: 60 # seconds to wait before scaling to zero (idle path only)
    queueLengthValue: "1000" # 1 replica per 1000 messages
    # Same intent as ingestionApi.hpa's pair above, applied to the HPA KEDA
    # generates — see scaledobject.yaml's comment on why cooldownPeriod
    # alone doesn't cover every scale-down step.
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

# One Deployment + one KEDA ScaledObject is rendered per entry (see
# templates/consumer-worker/). Adding a 6th payment method is a one-line
# change here — no new template files needed.
paymentMethods:
  - name: pix
    queue: payments.pix.queue
    metricsPort: 9091
  - name: boleto
    queue: payments.boleto.queue
    metricsPort: 9092
  - name: transfer
    queue: payments.transfer.queue
    metricsPort: 9093
  - name: cartao-credito
    queue: payments.cartao_credito.queue
    metricsPort: 9094
  - name: cartao-debito
    queue: payments.cartao_debito.queue
    metricsPort: 9095

# KIND-local convenience only — off everywhere else (compose has its own
# host-published 15672, the cloud target has no equivalent at all). RabbitMQ
# itself is a plain Deployment in the "default" namespace
# (infra/kind/postgres-rabbitmq.yaml), not part of this chart, so this
# renders a standalone Service (templates/kind-local/rabbitmq-nodeport.yaml)
# explicitly namespaced to "default" rather than .Values.namespace — Helm
# allows a release to own resources outside its own --namespace as long as
# the target namespace already exists. NodePort must sit in the
# 30000-32767 range; infra/kind/kind-cluster-config.yaml maps host 15673 ->
# this nodePort so it's reachable without `kubectl port-forward`.
kindLocal:
  enabled: false
  rabbitmqManagementNodePort: 30673
  ingestionApiNodePort: 30080
