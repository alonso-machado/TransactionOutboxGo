namespace: transaction-outbox

image:
  ingestionApi: transaction-outbox-go/ingestion-api:latest
  outboxWorker: transaction-outbox-go/outbox-worker:latest
  orderConsumerWorker: transaction-outbox-go/order-consumer-worker:latest
  fulfillmentConsumerWorker: transaction-outbox-go/fulfillment-consumer-worker:latest
  ticketsApi: transaction-outbox-go/tickets-api:latest
  notificationRetryCron: transaction-outbox-go/notification-retry-cron:latest
  backstage: transaction-outbox-go/backstage:latest

# Non-sensitive configuration shared across services, rendered verbatim into
# the transaction-outbox-config ConfigMap.
configMap:
  data:
    # ── ingestion-api ──────────────────────────────────────────────────────
    HTTP_PORT: "8080"
    OUTBOX_DISPATCH_INTERVAL_MS: "250"
    OUTBOX_DISPATCH_BATCH_SIZE: "50"
    OUTBOX_MAX_RETRIES: "5"
    OUTBOX_PRUNE_AFTER_HOURS: "48"

    # ── order-consumer-worker / fulfillment-consumer-worker ────────────────
    PREFETCH_COUNT: "10"
    MAX_DELIVERIES: "5"

    # ── Payment gateway (ingestion-api's webhook verify + order-consumer-
    # worker's checkout) ────────────────────────────────────────────────────
    PAYMENT_PROVIDER: "fake"
    CHECKOUT_SUCCESS_URL: "http://localhost:8080/orders/success"

    # ── Observability (Phase 2 Track 1 — OpenTelemetry) ─────────────────────
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    OTEL_SERVICE_NAME: "transaction-outbox"
    # Default for ingestion-api. Each shard's order/fulfillment-consumer-worker
    # Deployment overrides this via its own env: entry — explicit env: takes
    # precedence over envFrom: on a key collision, so this default never
    # reaches those pods.
    METRICS_PORT: "9090"

    # ── API docs (Phase 2 Track 2 — Swagger) ────────────────────────────────
    # Disabled in production; enable only in lower environments via override.
    SWAGGER_ENABLED: "false"

    # ── Messaging topology ───────────────────────────────────────────────────
    RABBITMQ_MANAGEMENT_URL: "http://rabbitmq:15672"

    # ── PCI-DSS encryption-in-transit (Phase 5 Track 5.B) ───────────────────
    # Cloud (RDS/Amazon MQ) enforces TLS; a cloud values override sets these
    # true/"require" for that target. Default here matches the plaintext
    # local/compose posture.
    DB_SSL_MODE: "disable"
    RABBITMQ_TLS: "false"

    # ── Email delivery (fulfillment-consumer-worker sends synchronously;
    # notification-retry-cron retries any failed send) ─────────────────────
    EMAIL_PROVIDER: "fake"
    SMTP_HOST: ""
    SMTP_PORT: "587"
    SMTP_FROM_EMAIL: "tickets@example.com"
    SMTP_FROM_NAME: "Event Tickets"

    # ── Staff auth (Phase 8 — tickets-api's POST /api/v1/checkin) ───────────
    # "fake" locally/in lower environments (no real Clerk account needed);
    # a cloud values override sets this to "clerk".
    STAFF_AUTH_PROVIDER: "fake"
    STAFF_AUTH_FAKE_TOKEN: "dev-staff-token"
    STAFF_AUTH_FAKE_CLERK_USER_ID: "dev-staff-user"

# PLACEHOLDER — do NOT use these values in any real environment. Real
# connection strings are injected by CI/CD (GitHub Actions secrets, HashiCorp
# Vault, Sealed Secrets, etc.) at deploy time via
# `--set secret.databaseUrl=... --set secret.eventsDatabaseUrl=... --set secret.rabbitmqUrl=...`
# or a values override file — never commit real connection strings here.
# Plaintext here; templates/secret.yaml base64-encodes them.
#
# Two-DB split: databaseUrl is the `outbox` database (order_outbox +
# payment_event_outbox), used by ingestion-api and outbox-worker;
# eventsDatabaseUrl is the `events` database (locations/events/orders/
# tickets/charges), used by order-consumer-worker and
# fulfillment-consumer-worker. Same Postgres/RDS instance, two logical
# databases. (databaseUrl keeps its original name — the outbox side is the
# pre-split default — so only the events URL is additive.)
#
# Phase 5 Track 3.B convention: when pgbouncer.enabled is true, both URLs
# should point at the in-cluster PgBouncer Service
# (postgres://<user>:<pass>@pgbouncer.{{ .Values.namespace }}.svc.cluster.local:6432/<db>,
# with <db> being `outbox` or `events`) instead of RDS directly —
# pgbouncer.upstreamHost/.upstreamPort below is where the *real* Postgres/RDS
# endpoint goes, kept separate from the apps' own DATABASE_URL so PgBouncer is
# genuinely in front of, not bypassed by, every connection.
secret:
  databaseUrl: "CHANGE_ME"
  eventsDatabaseUrl: "CHANGE_ME"
  rabbitmqUrl: "CHANGE_ME"
  # Stripe adapter secrets (internal/adapter/paymentgateway/stripe) — only
  # meaningful when configMap.data.PAYMENT_PROVIDER is "stripe". Harmless
  # placeholders otherwise (the fake/abacatepay/lemonsqueezy adapters never
  # read them).
  stripeSecretKey: "CHANGE_ME"
  stripeWebhookSecret: "CHANGE_ME"
  # HMAC key internal/adapter/ticketqr signs every issued ticket's validation
  # code with — fulfillment-consumer-worker only.
  ticketSigningSecret: "CHANGE_ME"
  # Clerk secret key (tickets-api, STAFF_AUTH_PROVIDER=clerk only) and SMTP
  # credentials (fulfillment-consumer-worker + notification-retry-cron,
  # EMAIL_PROVIDER=smtp only). Harmless placeholders when those providers
  # aren't selected.
  clerkSecretKey: "CHANGE_ME"
  smtpUsername: "CHANGE_ME"
  smtpPassword: "CHANGE_ME"

# External Secrets Operator (Phase 5 Track 5.A). False by default — local/
# compose and any bare cluster without ESO installed keep using the static
# Secret above (templates/secret.yaml). A cloud values override sets this
# true (after installing ESO + its IRSA role separately) and supplies
# region/the Secrets Manager entry names ESO's ExternalSecret CR
# (templates/externalsecret.yaml) syncs from.
externalSecrets:
  enabled: false
  region: "us-east-1"
  databaseSecretName: "transaction-outbox/dev/database-url"
  eventsDatabaseSecretName: "transaction-outbox/dev/events-database-url"
  rabbitmqSecretName: "transaction-outbox/dev/rabbitmq-url"
  stripeSecretKeySecretName: "transaction-outbox/dev/stripe-secret-key"
  stripeWebhookSecretSecretName: "transaction-outbox/dev/stripe-webhook-secret"
  ticketSigningSecretSecretName: "transaction-outbox/dev/ticket-signing-secret"
  clerkSecretKeySecretName: "transaction-outbox/dev/clerk-secret-key"
  smtpUsernameSecretName: "transaction-outbox/dev/smtp-username"
  smtpPasswordSecretName: "transaction-outbox/dev/smtp-password"

# Phase 5 Track 3.B/3.C — PgBouncer (transaction-pooling mode) + its
# pgbouncer-exporter sidecar, in front of RDS. Mirrors docker-compose.yml's
# pgbouncer/pgbouncer-exporter services so local and cloud behave
# identically. Disabled by default so existing deployments aren't forced
# into the pooler topology change without an explicit opt-in; a cloud values
# override sets this true.
pgbouncer:
  enabled: false
  replicas: 1
  image: "edoburu/pgbouncer:latest"
  # The real Postgres/RDS endpoint PgBouncer pools connections to — set this
  # to the RDS instance's endpoint in the cloud values override; "postgres"
  # only resolves locally via compose, kept here purely as a documented
  # default.
  upstreamHost: "postgres"
  upstreamPort: 5432
  authType: scram-sha-256
  adminUser: "outbox"
  maxClientConn: 1000
  defaultPoolSize: 25
  # PLACEHOLDER — base64-decoded contents of userlist.txt
  # ("\"user\" \"password\"" lines); inject via
  # --set pgbouncer.userlist=... at deploy time, never commit real
  # credentials. See observability/pgbouncer/pgbouncer.ini's comment on the
  # plain-vs-scram-sha-256 tradeoff for how the password must be shaped.
  userlist: "CHANGE_ME"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  exporter:
    image: "quay.io/prometheuscommunity/pgbouncer-exporter:latest"
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"
  # PLACEHOLDER — postgres://<admin_user>:<password>@pgbouncer:6432/pgbouncer?sslmode=disable
  exporterDsn: "CHANGE_ME"

# Argo Rollouts canary (Phase 4 Track 4). Off by default — Argo Rollouts'
# CRDs/controller don't exist in plain docker-compose or a bare cluster, so
# with this false the chart renders plain Deployments/HPA exactly as before.
# A cloud target sets this true via --set once Argo Rollouts is installed.
canary:
  enabled: false
  ingestionApi:
    # Manual at the start, then time-gated — see .claude/plan-phase4.md Track 4.
    # setWeight 0 + an indefinite pause is what makes every deploy land at 0%
    # and wait; the canary:true header (ingress-canary-header.yaml) routes to
    # it regardless of weight, so it's testable even while paused at 0%.
    promotionStepDuration: 20m
    analysis:
      # Background AnalysisTemplate query — Track 3's Prometheus, scoped to
      # this Rollout's canary Service. Auto-aborts if the canary's 5xx ratio
      # exceeds this threshold.
      prometheusAddress: "http://prometheus.transaction-outbox.svc.cluster.local:9090"
      errorRateThreshold: "0.05"
      interval: 1m
  orderConsumerWorker:
    # After 1h sitting at 5% with no manual action, skip straight to 100% —
    # no 20/50 intermediate steps (see plan doc for why).
    soakDuration: 1h
  fulfillmentConsumerWorker:
    soakDuration: 1h

ingestionApi:
  replicas: 1
  # Empty by default (schedules on any node) — a cloud values override can
  # pin ingestion-api pods to its own dedicated node group, separate from
  # the consumer workers'.
  nodeSelector: {}
  service:
    type: ClusterIP
    annotations: {}
  # ALB Ingress (Phase 4 Track 1's front-door change, also Track 4's
  # prerequisite for request-weighted canary splitting). False locally/bare
  # clusters where the AWS Load Balancer Controller isn't installed.
  ingress:
    enabled: false
    wafAclArn: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    # Off by default — ingestion-api now runs at a fixed replica count
    # (ingestionApi.replicas, default 1). It's a thin, broker-independent
    # write path in front of the outbox; the autoscaling workload is
    # outbox-worker (KEDA, on outbox backlog) and each shard's order/
    # fulfillment-consumer-worker (KEDA, on queue depth), not this. Flip to
    # true to restore CPU/memory HPA using the thresholds below — when
    # false, the Deployment owns .spec.replicas and the
    # HorizontalPodAutoscaler isn't rendered (templates/ingestion-api/hpa.yaml).
    enabled: false
    minReplicas: 1
    # Measured under 200 VUs / ~667 req/s sustained (loadtest/README.md
    # 6.2): ingestion-api never needed more than 4 replicas before CPU
    # utilization dropped back under cpuUtilization below. Lowered from 10
    # to match observed need rather than leaving idle headroom every
    # environment pays for; raise it again if a higher load level proves
    # 4 isn't enough.
    maxReplicas: 4
    cpuUtilization: 70
    memoryUtilization: 80
    # 0 — scale up on the very next HPA sync, no waiting. 30 — hold a scale-up
    # for at least this long before scaling back down, so a load spike that
    # drains in a few seconds doesn't immediately give the replica back.
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

# The Transactional Outbox relay, split out of ingestion-api into its own
# Deployment + KEDA ScaledObject (templates/outbox-worker/). Runs two
# dispatch loops (order_outbox + payment_event_outbox); the ScaledObject
# scales on the SUM of both backlogs via KEDA's postgresql scaler, with a
# floor of 1 so the order_outbox LISTEN/NOTIFY fast path stays warm and the
# hourly prune / backlog metrics always have a live pod.
outboxWorker:
  # Empty by default — the cloud target can pin these pods to the same
  # ingestion-side node group as ingestion-api (both touch only the outbox DB).
  nodeSelector: {}
  metricsPort: 9090
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  keda:
    # 1, not 0 (unlike the consumer workers): keeps the order_outbox
    # LISTEN/NOTIFY connection live so an order publishes in single-digit ms
    # instead of waiting for KEDA to spin a pod, and keeps the
    # prune/metrics tickers running.
    minReplicaCount: 1
    maxReplicaCount: 10
    pollingInterval: 15 # seconds between outbox-backlog checks
    cooldownPeriod: 60
    # 1 replica per this many NEW/RETRYING rows, summed across both outbox
    # tables. Multiple replicas are safe: OutboxRepository.FetchPending uses
    # FOR UPDATE SKIP LOCKED, so they never double-publish a row.
    targetQueryValue: "100"
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

# order-consumer-worker: reserves tickets + opens a gateway checkout for one
# order_outbox shard's queue. Same resource/KEDA shape reused by every shard
# in eventShards below.
orderConsumerWorker:
  # Empty by default — a cloud values override can pin these pods to their
  # own dedicated node group, separate from ingestion-api's.
  nodeSelector: {}
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  keda:
    minReplicaCount: 0 # scale to zero when idle
    maxReplicaCount: 10
    pollingInterval: 15 # seconds between queue checks
    cooldownPeriod: 60 # seconds to wait before scaling to zero (idle path only)
    queueLengthValue: "1000" # 1 replica per 1000 messages
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

# fulfillment-consumer-worker: issues tickets (QR + HMAC) for one
# payment_event_outbox shard's queue, once the gateway confirms payment.
fulfillmentConsumerWorker:
  nodeSelector: {}
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  keda:
    minReplicaCount: 0
    maxReplicaCount: 10
    pollingInterval: 15
    cooldownPeriod: 60
    queueLengthValue: "1000"
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

# tickets-api (Phase 8): synchronous REST reading/writing the events DB
# directly (GET order-status, POST check-in, PATCH ticket-holder). No
# canary/Rollout variant yet — always a plain Deployment (see
# templates/tickets-api/deployment.yaml's comment). No Ingress yet either:
# GET /api/v1/orders/{id} would collide with ingestion-api's existing
# POST /api/v1/orders path on a path-only ALB rule — reachable via
# port-forward/in-cluster only until an ALB method-based routing strategy is
# decided (a Phase 8 scope cut, flagged rather than silently applied).
ticketsApi:
  replicas: 1
  nodeSelector: {}
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    cpuUtilization: 70
    memoryUtilization: 80
    scaleUpStabilizationSeconds: 0
    scaleDownStabilizationSeconds: 30

# notification-retry-cron: a Kubernetes CronJob (no RabbitMQ, no
# Deployment/ScaledObject) that retries any ticket_notifications row still
# missing email_sent_timestamp — the immediate send happens synchronously in
# fulfillment-consumer-worker instead (see internal/usecase/fulfillment.
# IssueTickets), this is only the retry path.
notificationRetryCron:
  nodeSelector: {}
  # Every 2 minutes — frequent enough that a transient SMTP hiccup recovers
  # quickly, infrequent enough not to matter that concurrencyPolicy: Forbid
  # (cronjob.yaml) serializes runs.
  schedule: "*/2 * * * *"
  batchSize: 50
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"

# Phase 9: Backstage developer portal (Software Catalog + API docs +
# TechDocs). No HPA/canary — see templates/backstage/deployment.yaml.
# Disable with `--set backstage.enabled=false` on clusters that don't need
# it (e.g. a minimal KIND smoke-test install).
backstage:
  enabled: true
  replicas: 1
  nodeSelector: {}
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# One order-consumer-worker Deployment/Rollout + ScaledObject and one
# fulfillment-consumer-worker Deployment/Rollout + ScaledObject are rendered
# per entry (templates/order-consumer-worker/, templates/
# fulfillment-consumer-worker/) — matches the registry in
# internal/infrastructure/rabbitmq.EventTypes. Only a representative subset
# is deployed here (mirrors docker-compose.yml's local default); add an
# entry (+ a metrics-port pair not already in use) to exercise another
# registry pair — no new template files needed.
eventShards:
  - eventType: CONCERT
    eventSubtype: ROCK
    name: concert-rock
    orderQueue: events.concert.rock.queue
    paymentQueue: payments.concert.rock.queue
    orderMetricsPort: 9091
    fulfillmentMetricsPort: 9093
  - eventType: SPORTS
    eventSubtype: FOOTBALL
    name: sports-football
    orderQueue: events.sports.football.queue
    paymentQueue: payments.sports.football.queue
    orderMetricsPort: 9092
    fulfillmentMetricsPort: 9094

# KIND-local convenience only — off everywhere else (compose has its own
# host-published 15672, the cloud target has no equivalent at all). RabbitMQ
# itself is a plain Deployment in the "default" namespace
# (infra/kind/postgres-rabbitmq.yaml), not part of this chart, so this
# renders a standalone Service (templates/kind-local/rabbitmq-nodeport.yaml)
# explicitly namespaced to "default" rather than .Values.namespace — Helm
# allows a release to own resources outside its own --namespace as long as
# the target namespace already exists. NodePort must sit in the
# 30000-32767 range; infra/kind/kind-cluster-config.yaml maps host 15673 ->
# this nodePort so it's reachable without `kubectl port-forward`.
kindLocal:
  enabled: false
  rabbitmqManagementNodePort: 30673
  ingestionApiNodePort: 30080
