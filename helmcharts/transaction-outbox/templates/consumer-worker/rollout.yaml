{{- if .Values.canary.enabled }}
{{- range .Values.paymentMethods }}
---
# Argo Rollout — replaces deployment.yaml one-for-one when canary.enabled,
# one per payment method as before. consumer-worker has no Service (Phase 3
# Track 4 — nothing calls it, it pulls from its queue), so there's no
# trafficRouting block: weight here means canary/stable POD PROPORTION, i.e.
# the fraction of consumer pods running the new image and therefore the
# fraction of messages it processes — see .claude/plan-phase4.md Track 4.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: consumer-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: consumer-{{ .name }}
    {{- include "transaction-outbox.labels" $ | nindent 4 }}
spec:
  # Managed by this method's KEDA ScaledObject (scaledobject.yaml), retargeted
  # to this Rollout — starts at 0 and scales on RabbitMQ queue depth.
  replicas: 0
  selector:
    matchLabels:
      app: consumer-{{ .name }}
  template:
    metadata:
      labels:
        app: consumer-{{ .name }}
    spec:
      {{- with $.Values.consumerWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: consumer-worker
          image: {{ $.Values.image.consumerWorker }}
          ports:
            - name: metrics
              containerPort: {{ .metricsPort }}
          envFrom:
            - configMapRef:
                name: transaction-outbox-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  # payments DB — consumer-worker is the only writer of payments_*.
                  key: PAYMENTS_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: RABBITMQ_URL
            - name: PAYMENT_QUEUE
              value: {{ .queue }}
            - name: METRICS_PORT
              value: {{ .metricsPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: consumer-worker-{{ .name }}
          resources:
            {{- toYaml $.Values.consumerWorker.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
  strategy:
    canary:
      steps:
        - setWeight: 0
        - pause: {}                                                    # MANUAL — 0%
        - setWeight: 5
        - pause: { duration: {{ $.Values.canary.consumerWorker.soakDuration }} }  # AUTO — after the soak, skip straight to 100%
        - setWeight: 100
{{- end }}
{{- end }}
