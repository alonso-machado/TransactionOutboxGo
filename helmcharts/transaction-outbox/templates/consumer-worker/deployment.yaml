{{- if not .Values.canary.enabled }}
{{- range .Values.paymentMethods }}
---
# One Deployment per payment method (Phase 3 Track 1), rendered from this
# single template via the paymentMethods list in values.yaml — adding a new
# method needs no new template, just a new list entry. Used when
# canary.enabled is false; see rollout.yaml for the canary.enabled=true path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: consumer-{{ .name }}
    {{- include "transaction-outbox.labels" $ | nindent 4 }}
spec:
  # No replicas field — this method's KEDA ScaledObject (scaledobject.yaml)
  # owns it exclusively via the keda-hpa-* HPA it generates. Templating 0
  # here makes every `helm upgrade` fight that HPA for ownership of
  # .spec.replicas via server-side apply ("conflict ... using apps/v1:
  # .spec.replicas") once KEDA has scaled it away from 0. Omitting it lets
  # Kubernetes default to 1 replica only on first creation, before the
  # ScaledObject exists to reconcile it down to minReplicaCount (0).
  selector:
    matchLabels:
      app: consumer-{{ .name }}
  template:
    metadata:
      labels:
        app: consumer-{{ .name }}
    spec:
      {{- with $.Values.consumerWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: consumer-worker
          # CI tags images by git SHA (see Dockerfile ARG SERVICE=consumer-worker);
          # the values.yaml default is a placeholder for local/manual use.
          image: {{ $.Values.image.consumerWorker }}
          ports:
            - name: metrics
              containerPort: {{ .metricsPort }}
          envFrom:
            - configMapRef:
                name: transaction-outbox-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  # payments DB — consumer-worker is the only writer of payments_*.
                  key: PAYMENTS_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: RABBITMQ_URL
            - name: PAYMENT_QUEUE
              value: {{ .queue }}
            - name: METRICS_PORT
              value: {{ .metricsPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: consumer-worker-{{ .name }}
          resources:
            {{- toYaml $.Values.consumerWorker.resources | nindent 12 }}
          # consumer-worker has no main HTTP server, but it does expose a
          # Prometheus /metrics endpoint (internal/infrastructure/telemetry).
          # startupProbe gives a generous grace period for the initial DB +
          # RabbitMQ connection before liveness starts enforcing its tighter
          # threshold — every one of these Deployments scales from 0 via
          # KEDA, so every pod start is a cold start. While startupProbe is
          # failing, liveness/readiness are not evaluated, so they don't need
          # their own initialDelaySeconds.
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
{{- end }}
{{- end }}
