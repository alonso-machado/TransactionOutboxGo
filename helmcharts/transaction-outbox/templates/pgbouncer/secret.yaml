{{- if .Values.pgbouncer.enabled }}
# PLACEHOLDER — same convention as templates/secret.yaml: real values come
# from CI/CD (--set pgbouncer.userlist=... / pgbouncer.exporterDsn=...) or a
# values override file, never committed here. userlist.txt's password must
# be whatever auth_type (values.yaml) requires (plain locally; a real SCRAM
# verifier or auth_query against Postgres in production — see
# observability/pgbouncer/pgbouncer.ini's comment on this same tradeoff).
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-userlist
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
type: Opaque
data:
  userlist.txt: {{ .Values.pgbouncer.userlist | b64enc }}
---
# Separate Secret object (not folded into templates/secret.yaml) so the
# pgbouncer-exporter sidecar's DSN ships independently of
# DATABASE_URL/RABBITMQ_URL without touching that Track-1-era manifest.
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-exporter-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
type: Opaque
data:
  PGBOUNCER_EXPORTER_DSN: {{ .Values.pgbouncer.exporterDsn | b64enc }}
{{- end }}
