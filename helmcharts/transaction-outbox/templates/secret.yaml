# PLACEHOLDER SECRET — do NOT use these values in any real environment.
# Real DATABASE_URL / RABBITMQ_URL credentials are injected by CI/CD
# (e.g. GitHub Actions secrets, HashiCorp Vault, or Sealed Secrets) at
# deploy time via `--set secret.databaseUrl=...` or a values override file.
# Never commit actual passwords or connection strings here.
apiVersion: v1
kind: Secret
metadata:
  name: transaction-outbox-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secret.databaseUrl | b64enc }}
  RABBITMQ_URL: {{ .Values.secret.rabbitmqUrl | b64enc }}
