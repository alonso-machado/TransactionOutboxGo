# PLACEHOLDER SECRET — do NOT use these values in any real environment.
# Real DATABASE_URL / RABBITMQ_URL credentials are injected by CI/CD
# (e.g. GitHub Actions secrets, HashiCorp Vault, or Sealed Secrets) at
# deploy time via `--set secret.databaseUrl=...` or a values override file.
# Never commit actual passwords or connection strings here.
{{- if not .Values.externalSecrets.enabled }}
# PLACEHOLDER SECRET — do NOT use these values in any real environment.
# Real DATABASE_URL / RABBITMQ_URL credentials are injected by CI/CD
# (e.g. GitHub Actions secrets, HashiCorp Vault, or Sealed Secrets) at
# deploy time via `--set secret.databaseUrl=...` or a values override file.
# Never commit actual passwords or connection strings here.
#
# This is the local/compose fallback (Phase 5 Track 5.A): when
# externalSecrets.enabled is true (EKS/Pulumi), templates/externalsecret.yaml
# renders an ExternalSecret instead, which the External Secrets Operator
# syncs from AWS Secrets Manager into this exact same Secret name
# ("transaction-outbox-secrets") — so neither template ever needs to render
# at the same time as the other, and nothing downstream (envFrom references)
# needs to know which one produced the Secret.
apiVersion: v1
kind: Secret
metadata:
  name: transaction-outbox-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
type: Opaque
data:
  # Two-DB split: DATABASE_URL is the `outbox` database (ingestion-api +
  # outbox-worker map their DATABASE_URL env from it); PAYMENTS_DATABASE_URL is
  # the `payments` database (consumer-worker maps its DATABASE_URL env from it).
  DATABASE_URL: {{ .Values.secret.databaseUrl | b64enc }}
  PAYMENTS_DATABASE_URL: {{ .Values.secret.paymentsDatabaseUrl | b64enc }}
  RABBITMQ_URL: {{ .Values.secret.rabbitmqUrl | b64enc }}
{{- end }}
