{{- range .Values.eventShards }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-consumer-worker-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    name: order-consumer-worker-{{ .name }}
    {{- if $.Values.canary.enabled }}
    # Re-pointed from Deployment to Rollout (Phase 4 Track 4) — missing this
    # is the one non-obvious wiring detail that silently breaks autoscaling
    # when converting to canary.
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    {{- end }}
  minReplicaCount: {{ $.Values.orderConsumerWorker.keda.minReplicaCount }} # scale to zero when idle
  maxReplicaCount: {{ $.Values.orderConsumerWorker.keda.maxReplicaCount }}
  pollingInterval: {{ $.Values.orderConsumerWorker.keda.pollingInterval }} # seconds between queue checks
  cooldownPeriod: {{ $.Values.orderConsumerWorker.keda.cooldownPeriod }} # seconds to wait before scaling to zero
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: {{ $.Values.orderConsumerWorker.keda.scaleUpStabilizationSeconds }}
          # Without this, the HPA default policy (max of "+4 pods" or
          # "double") needs two 15s pollingInterval cycles to go from 1
          # replica to maxReplicaCount=10 (1->5->10) — a 40k-message queue
          # spike piles up well before that. A single Pods policy sized to
          # maxReplicaCount lets one reconcile jump straight to max instead
          # of ramping. periodSeconds matches pollingInterval since that's
          # how often KEDA actually has a new value to react to anyway —
          # making the policy's own window shorter wouldn't help.
          policies:
            - type: Pods
              value: {{ $.Values.orderConsumerWorker.keda.maxReplicaCount }}
              periodSeconds: {{ $.Values.orderConsumerWorker.keda.pollingInterval }}
        scaleDown:
          stabilizationWindowSeconds: {{ $.Values.orderConsumerWorker.keda.scaleDownStabilizationSeconds }}
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: {{ .orderQueue }}
        mode: QueueLength
        value: {{ $.Values.orderConsumerWorker.keda.queueLengthValue | quote }}
        hostFromEnv: RABBITMQ_MANAGEMENT_URL
{{- end }}
