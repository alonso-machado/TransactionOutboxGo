{{- if .Values.canary.enabled }}
{{- range .Values.eventShards }}
---
# Argo Rollout — replaces deployment.yaml one-for-one when canary.enabled,
# one per shard as before. order-consumer-worker has no Service (nothing
# calls it, it pulls from its queue), so there's no trafficRouting block:
# weight here means canary/stable POD PROPORTION, i.e. the fraction of
# consumer pods running the new image and therefore the fraction of orders
# it processes — see .claude/plan-phase4.md Track 4.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: order-consumer-worker-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: order-consumer-worker-{{ .name }}
    {{- include "transaction-outbox.labels" $ | nindent 4 }}
spec:
  # Managed by this shard's KEDA ScaledObject (scaledobject.yaml), retargeted
  # to this Rollout — starts at 0 and scales on RabbitMQ queue depth.
  replicas: 0
  selector:
    matchLabels:
      app: order-consumer-worker-{{ .name }}
  template:
    metadata:
      labels:
        app: order-consumer-worker-{{ .name }}
    spec:
      {{- with $.Values.orderConsumerWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: order-consumer-worker
          image: {{ $.Values.image.orderConsumerWorker }}
          ports:
            - name: metrics
              containerPort: {{ .orderMetricsPort }}
          envFrom:
            - configMapRef:
                name: transaction-outbox-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: EVENTS_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: RABBITMQ_URL
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: CONSUMER_QUEUE
              value: {{ .orderQueue }}
            - name: METRICS_PORT
              value: {{ .orderMetricsPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: order-consumer-worker-{{ .name }}
          resources:
            {{- toYaml $.Values.orderConsumerWorker.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
  strategy:
    canary:
      steps:
        - setWeight: 0
        - pause: {}                                                              # MANUAL — 0%
        - setWeight: 5
        - pause: { duration: {{ $.Values.canary.orderConsumerWorker.soakDuration }} }  # AUTO — after the soak, skip straight to 100%
        - setWeight: 100
{{- end }}
{{- end }}
