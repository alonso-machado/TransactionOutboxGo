apiVersion: v1
kind: Service
metadata:
  name: ingestion-api
  namespace: {{ .Values.namespace }}
  labels:
    app: ingestion-api
    {{- include "transaction-outbox.labels" . | nindent 4 }}
  {{- with .Values.ingestionApi.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # ClusterIP by default (local/dev). The cloud target (infra/pulumi)
  # overrides this to LoadBalancer so ingestion-api is the ONLY service
  # reachable from outside the cluster — consumer-worker, RabbitMQ/Amazon MQ,
  # and Postgres/RDS stay private (see infra/pulumi/data.go's security
  # group, which only allows ingress from the EKS node security group).
  type: {{ .Values.ingestionApi.service.type | default "ClusterIP" }}
  selector:
    app: ingestion-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
