# Doubles as the Rollout's stableService when canary.enabled (rollout.yaml) —
# Argo Rollouts mutates this Service's selector to track the stable
# ReplicaSet at runtime; its own selector below is just the initial value.
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api
  namespace: {{ .Values.namespace }}
  labels:
    app: ingestion-api
    {{- include "transaction-outbox.labels" . | nindent 4 }}
  {{- with .Values.ingestionApi.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # ClusterIP by default (local/dev). A cloud values override sets this to
  # LoadBalancer so ingestion-api is the ONLY service reachable from outside
  # the cluster — consumer-worker, RabbitMQ/Amazon MQ, and Postgres/RDS stay
  # private (enforced at the cloud network layer, outside this chart).
  # kindLocal.enabled forces NodePort regardless of ingestionApi.service.type
  # — k6 on the Windows host (loadtest/README.md) needs a fixed, scriptable
  # address; kind-cluster-config.yaml maps host 8081 to this same NodePort.
  type: {{ if .Values.kindLocal.enabled }}NodePort{{ else }}{{ .Values.ingestionApi.service.type | default "ClusterIP" }}{{ end }}
  selector:
    app: ingestion-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      {{- if .Values.kindLocal.enabled }}
      nodePort: {{ .Values.kindLocal.ingestionApiNodePort }}
      {{- end }}
    - name: metrics
      port: 9090
      targetPort: 9090
