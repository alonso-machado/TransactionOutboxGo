{{- if and (not .Values.canary.enabled) .Values.ingestionApi.hpa.enabled }}
# Rendered only when canary is off AND hpa.enabled is true. ingestion-api now
# defaults to a fixed replica count (hpa.enabled=false → the Deployment owns
# .spec.replicas), so this HPA is opt-in. The Rollout (canary.enabled=true)
# owns the replica count itself during a rollout, which an external HPA
# targeting the same workload would fight with — hence the canary exclusion too.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestion-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestion-api
  minReplicas: {{ .Values.ingestionApi.hpa.minReplicas }}
  maxReplicas: {{ .Values.ingestionApi.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingestionApi.hpa.cpuUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingestionApi.hpa.memoryUtilization }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.ingestionApi.hpa.scaleUpStabilizationSeconds }}
      # Same reasoning as consumer-worker's ScaledObject — without an
      # explicit policy, the HPA default (max of "+4 pods" or "double" per
      # 15s sync) needs multiple cycles to reach maxReplicas from 1. A
      # single Pods policy sized to maxReplicas lets one sync jump straight
      # there under a sudden spike instead of ramping.
      policies:
        - type: Pods
          value: {{ .Values.ingestionApi.hpa.maxReplicas }}
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.ingestionApi.hpa.scaleDownStabilizationSeconds }}
{{- end }}
