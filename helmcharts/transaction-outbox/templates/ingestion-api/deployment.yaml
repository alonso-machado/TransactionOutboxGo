{{- if not .Values.canary.enabled }}
# Plain rolling Deployment — used when canary.enabled is false (local/bare
# clusters without the Argo Rollouts controller). See rollout.yaml for the
# canary.enabled=true path, which replaces this resource one-for-one.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
  namespace: {{ .Values.namespace }}
  labels:
    app: ingestion-api
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingestionApi.hpa.enabled }}
  # No replicas field — the HPA (hpa.yaml, rendered under this same
  # hpa.enabled condition) owns it exclusively. Templating a value here makes
  # every `helm upgrade` fight the HPA for ownership of .spec.replicas via
  # server-side apply ("conflict ... using apps/v1: .spec.replicas"), since
  # whichever one wrote it last is the field manager. Omitting it lets
  # Kubernetes default to 1 only on first creation; the HPA reconciles after.
  {{- else }}
  # HPA disabled (the default now) — ingestion-api runs at a fixed replica
  # count, so this Deployment owns .spec.replicas directly. No HPA is rendered,
  # so there's nothing to fight over the field.
  replicas: {{ .Values.ingestionApi.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
    spec:
      {{- with .Values.ingestionApi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingestion-api
          # CI tags images by git SHA (see Dockerfile ARG SERVICE=ingestion-api);
          # the values.yaml default is a placeholder for local/manual use.
          image: {{ .Values.image.ingestionApi }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: transaction-outbox-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  # outbox DB (the DATABASE_URL key) — ingestion-api only writes
                  # outbox_messages. consumer-worker uses PAYMENTS_DATABASE_URL.
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: RABBITMQ_URL
          resources:
            {{- toYaml .Values.ingestionApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
