# Phase 8: notification-consumer-worker's Deployment. Unlike
# order-consumer-worker/fulfillment-consumer-worker, this is a SINGLE
# Deployment (no range over eventShards) — ticket_notification_outbox's
# stream is deliberately unsharded (see
# internal/infrastructure/rabbitmq.NotificationStream's doc comment), so
# there is only ever one queue and one Deployment/ScaledObject pair, not
# one per (event_type, event_subtype). Always a plain Deployment — no
# Rollout/canary variant for this service yet (a deliberate Phase 8 scope
# cut, same as tickets-api).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-consumer-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-consumer-worker
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  # No replicas field — KEDA's ScaledObject (scaledobject.yaml) owns it.
  selector:
    matchLabels:
      app: notification-consumer-worker
  template:
    metadata:
      labels:
        app: notification-consumer-worker
    spec:
      {{- with .Values.notificationConsumerWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: notification-consumer-worker
          image: {{ .Values.image.notificationConsumerWorker }}
          ports:
            - name: metrics
              containerPort: {{ .Values.notificationConsumerWorker.metricsPort }}
          envFrom:
            - configMapRef:
                name: transaction-outbox-config
          env:
            # Unused by this binary (usecase/notification.SendNotification
            # never queries a database) but config.Config's DatabaseURL
            # carries a shared required:"true" tag across every binary —
            # same "provide but ignore" precedent ingestion-api already
            # sets for its own unused RABBITMQ_URL.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: EVENTS_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: RABBITMQ_URL
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: SMTP_PASSWORD
            - name: METRICS_PORT
              value: {{ .Values.notificationConsumerWorker.metricsPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: notification-consumer-worker
          resources:
            {{- toYaml .Values.notificationConsumerWorker.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
