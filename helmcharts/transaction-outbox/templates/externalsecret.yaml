{{- if .Values.externalSecrets.enabled }}
# Phase 5 Track 5.A — sources DATABASE_URL/RABBITMQ_URL from AWS Secrets
# Manager via the External Secrets Operator (infra/pulumi/externalsecrets.go
# installs ESO + its IRSA role) instead of the plaintext static Secret
# (templates/secret.yaml, which stays the local/compose fallback when
# externalSecrets.enabled is false — see values.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: transaction-outbox-secretstore
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region }}
      # No explicit auth block: the external-secrets-operator pod (installed
      # cluster-wide by infra/pulumi/externalsecrets.go) authenticates via
      # IRSA — ESO falls back to the AWS SDK's default credential chain,
      # which resolves to that pod's own IRSA identity. No static AWS
      # credentials anywhere in this cluster.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: transaction-outbox-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: transaction-outbox-secretstore
    kind: SecretStore
  target:
    name: transaction-outbox-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.databaseSecretName }}
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: {{ .Values.externalSecrets.rabbitmqSecretName }}
{{- end }}
