{{- if .Values.externalSecrets.enabled }}
# Phase 5 Track 5.A — sources DATABASE_URL/RABBITMQ_URL from AWS Secrets
# Manager via the External Secrets Operator (ESO must be installed cluster-
# wide separately, with an IRSA role for SecretsManager access) instead of
# the plaintext static Secret (templates/secret.yaml, which stays the
# local/compose fallback when externalSecrets.enabled is false — see
# values.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: transaction-outbox-secretstore
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region }}
      # No explicit auth block: the external-secrets-operator pod (installed
      # cluster-wide, separately from this chart) authenticates via IRSA —
      # ESO falls back to the AWS SDK's default credential chain,
      # which resolves to that pod's own IRSA identity. No static AWS
      # credentials anywhere in this cluster.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: transaction-outbox-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-outbox.labels" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: transaction-outbox-secretstore
    kind: SecretStore
  target:
    name: transaction-outbox-secrets
    creationPolicy: Owner
  data:
    # Two-DB split — see templates/secret.yaml (the local/compose fallback that
    # produces the same Secret keys). DATABASE_URL → ingestion-api +
    # outbox-worker (outbox DB), EVENTS_DATABASE_URL → order-consumer-worker +
    # fulfillment-consumer-worker.
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.databaseSecretName }}
    - secretKey: EVENTS_DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.eventsDatabaseSecretName }}
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: {{ .Values.externalSecrets.rabbitmqSecretName }}
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.stripeSecretKeySecretName }}
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.stripeWebhookSecretSecretName }}
    - secretKey: TICKET_SIGNING_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.ticketSigningSecretSecretName }}
    - secretKey: CLERK_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.clerkSecretKeySecretName }}
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.smtpUsernameSecretName }}
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.smtpPasswordSecretName }}
{{- end }}
