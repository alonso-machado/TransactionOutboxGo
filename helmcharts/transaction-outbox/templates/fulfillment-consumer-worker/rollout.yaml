{{- if .Values.canary.enabled }}
{{- range .Values.eventShards }}
---
# Argo Rollout — replaces deployment.yaml one-for-one when canary.enabled.
# Same pod-proportion weighting rationale as
# order-consumer-worker/rollout.yaml — no Service, no trafficRouting block.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fulfillment-consumer-worker-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: fulfillment-consumer-worker-{{ .name }}
    {{- include "transaction-outbox.labels" $ | nindent 4 }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: fulfillment-consumer-worker-{{ .name }}
  template:
    metadata:
      labels:
        app: fulfillment-consumer-worker-{{ .name }}
    spec:
      {{- with $.Values.fulfillmentConsumerWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fulfillment-consumer-worker
          image: {{ $.Values.image.fulfillmentConsumerWorker }}
          ports:
            - name: metrics
              containerPort: {{ .fulfillmentMetricsPort }}
          envFrom:
            - configMapRef:
                name: transaction-outbox-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: EVENTS_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: RABBITMQ_URL
            - name: TICKET_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: TICKET_SIGNING_SECRET
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transaction-outbox-secrets
                  key: SMTP_PASSWORD
            - name: CONSUMER_QUEUE
              value: {{ .paymentQueue }}
            - name: METRICS_PORT
              value: {{ .fulfillmentMetricsPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: fulfillment-consumer-worker-{{ .name }}
          resources:
            {{- toYaml $.Values.fulfillmentConsumerWorker.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
  strategy:
    canary:
      steps:
        - setWeight: 0
        - pause: {}                                                                     # MANUAL — 0%
        - setWeight: 5
        - pause: { duration: {{ $.Values.canary.fulfillmentConsumerWorker.soakDuration }} }  # AUTO — after the soak, skip straight to 100%
        - setWeight: 100
{{- end }}
{{- end }}
