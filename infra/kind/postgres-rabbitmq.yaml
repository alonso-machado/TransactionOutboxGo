# Minimal in-cluster Postgres + RabbitMQ for local KIND load testing only —
# not part of the Helm chart (which always expects an external DB/MQ,
# RDS/Amazon MQ in AWS or docker-compose locally). No PVCs: ephemeral
# storage is fine for a load test, data is expected to be thrown away.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
  labels: { app: postgres }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: docker.io/timescale/timescaledb:latest-pg18
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: "outbox" }
            - { name: POSTGRES_PASSWORD, value: "outbox" }
            - { name: POSTGRES_DB, value: "outbox" }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "outbox", "-d", "outbox"] }
            initialDelaySeconds: 5
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: default
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: default
  labels: { app: rabbitmq }
spec:
  replicas: 1
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata: { labels: { app: rabbitmq } }
    spec:
      containers:
        - name: rabbitmq
          image: docker.io/library/rabbitmq:4.3-management
          ports:
            - { containerPort: 5672 }
            - { containerPort: 15672 }
          env:
            - { name: RABBITMQ_DEFAULT_USER, value: "guest" }
            - { name: RABBITMQ_DEFAULT_PASS, value: "guest" }
          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics", "ping"] }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: default
spec:
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: management, port: 15672, targetPort: 15672 }
