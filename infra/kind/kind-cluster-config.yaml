# KIND cluster config for local load testing (loadtest/README.md). Maps
# host ports to NodePorts that kindLocal.enabled (infra/kind/values-kind.yaml)
# makes the chart render as fixed NodePort Services — both avoid the
# equivalent docker-compose.yml host ports (15672/8080) so the two stacks
# can run side by side.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # RabbitMQ management UI/API — templates/kind-local/rabbitmq-nodeport.yaml
      - containerPort: 30673
        hostPort: 15673
        protocol: TCP
      # ingestion-api — templates/ingestion-api/service.yaml (NodePort when
      # kindLocal.enabled). k6 on the Windows host (loadtest/*.js) targets
      # this directly: TARGET_URL=http://localhost:8081
      - containerPort: 30080
        hostPort: 8081
        protocol: TCP
