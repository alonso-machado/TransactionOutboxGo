# One-shot migrate Job — the KIND analogue of docker-compose.yml's
# migrate-outbox/migrate-events services, sourced from ConfigMaps since KIND
# has no host-path mount for this cluster.
#
# Two-DB split: this now (1) creates the `events` database (the cluster
# analogue of observability/postgres/init-events.sql — the in-cluster
# Postgres only auto-creates `outbox`), (2) applies migrations/outbox to the
# `outbox` DB, then (3) applies migrations/events to the `events` DB.
# Because the two sets have overlapping version numbers and golang-migrate
# tracks schema_migrations per database, they MUST live in separate
# ConfigMaps/paths — see loadtest/README.md for the updated `kubectl create
# configmap` commands (migrations-outbox / migrations-events).
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: default
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      initContainers:
        # Idempotent CREATE DATABASE events — the psql client ships in the
        # stock postgres image; createdb is a no-op-guarded by the SELECT so
        # re-running the Job never errors on an already-created database.
        - name: createdb-events
          image: docker.io/library/postgres:18-alpine
          env:
            - { name: PGPASSWORD, value: outbox }
          command: ["sh", "-c"]
          args:
            - >
              psql -h postgres -U outbox -d outbox -tc "SELECT 1 FROM pg_database WHERE datname='events'" | grep -q 1 ||
              createdb -h postgres -U outbox events
        - name: migrate-outbox
          image: docker.io/migrate/migrate:latest
          args:
            - -path=/migrations/outbox
            - -database
            - postgres://outbox:outbox@postgres:5432/outbox?sslmode=disable
            - up
          volumeMounts:
            - { name: migrations-outbox, mountPath: /migrations/outbox }
      containers:
        - name: migrate-events
          image: docker.io/migrate/migrate:latest
          args:
            - -path=/migrations/events
            - -database
            - postgres://outbox:outbox@postgres:5432/events?sslmode=disable
            - up
          volumeMounts:
            - { name: migrations-events, mountPath: /migrations/events }
      volumes:
        - name: migrations-outbox
          configMap: { name: migrations-outbox }
        - name: migrations-events
          configMap: { name: migrations-events }
