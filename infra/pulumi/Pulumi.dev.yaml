config:
  aws:region: us-east-1
  transaction-outbox:environment: dev
  transaction-outbox:nodeInstanceType: t3.medium
  transaction-outbox:nodeDesiredCapacity: 2
  transaction-outbox:nodeMinCapacity: 1
  transaction-outbox:nodeMaxCapacity: 4
  transaction-outbox:dbInstanceClass: db.t3.micro
  transaction-outbox:dbMultiAz: false
  transaction-outbox:rabbitmqInstanceType: mq.t3.micro
  transaction-outbox:imageTag: latest
  # dbPassword / rabbitmqPassword are NOT set here — they must be added as
  # encrypted secrets before `pulumi up` can run:
  #   pulumi config set --secret dbPassword <...> --stack dev
  #   pulumi config set --secret rabbitmqPassword <...> --stack dev
  # `pulumi config set --secret` appends an encrypted entry to this file;
  # never hand-write a plaintext value under these keys.
