config:
  aws:region: us-east-1
  transaction-outbox:environment: prod
  transaction-outbox:nodeInstanceType: t3.large
  transaction-outbox:nodeDesiredCapacity: 3
  transaction-outbox:nodeMinCapacity: 2
  transaction-outbox:nodeMaxCapacity: 10
  transaction-outbox:dbInstanceClass: db.t3.medium
  transaction-outbox:dbMultiAz: true
  transaction-outbox:rabbitmqInstanceType: mq.m5.large
  # Two separate keys, NOT one shared imageTag — each CI workflow
  # (ingestion-api.yml / consumer-worker.yml) sets only its own key on
  # deploy, so deploying one service never redeploys the other's pods.
  transaction-outbox:imageTagIngestionApi: latest
  transaction-outbox:imageTagConsumerWorker: latest
  # dbPassword / rabbitmqPassword are NOT set here — they must be added as
  # encrypted secrets before `pulumi up` can run:
  #   pulumi config set --secret dbPassword <...> --stack prod
  #   pulumi config set --secret rabbitmqPassword <...> --stack prod
  # `pulumi config set --secret` appends an encrypted entry to this file;
  # never hand-write a plaintext value under these keys.
  #
  # albControllerPolicyArn is NOT set here either — create the IAM policy
  # once per account from AWS's published document
  # (https://kubernetes-sigs.github.io/aws-load-balancer-controller/latest/install/iam_policy.json),
  # then: pulumi config set albControllerPolicyArn <policy-arn> --stack prod
  # Left unset, the AWS Load Balancer Controller (Phase 4 Track 1/4) installs
  # but can't actually reconcile any Ingress — see albcontroller.go.
