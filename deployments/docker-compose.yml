services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-outbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outbox}
      POSTGRES_DB:       ${POSTGRES_DB:-outbox}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outbox} -d ${POSTGRES_DB:-outbox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  rabbitmq:
    image: rabbitmq:4.3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      - outbox

  # ── Application services ────────────────────────────────────────────────────

  ingestion-api:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        SERVICE: ingestion-api
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      HTTP_PORT: "${APP_PORT:-8080}"
      DISPATCH_INTERVAL_MS: "${OUTBOX_POLL_INTERVAL_MS:-500}"
      DISPATCH_BATCH_SIZE: "${OUTBOX_BATCH_SIZE:-50}"
      MAX_RETRIES: "${OUTBOX_MAX_RETRIES:-5}"
      PRUNE_AFTER_HOURS: "${OUTBOX_PRUNE_AFTER_HOURS:-24}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-ingestion-api}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4318}"
      METRICS_PORT: "${METRICS_PORT:-9090}"
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - outbox
    restart: unless-stopped

  consumer-worker:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        SERVICE: consumer-worker
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      PREFETCH_COUNT: "${CONSUMER_PREFETCH:-10}"
      MAX_DELIVERIES: "${RABBITMQ_MAX_REDELIVERIES:-5}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4318}"
      METRICS_PORT: "${CONSUMER_METRICS_PORT:-9091}"
    ports:
      - "${CONSUMER_METRICS_PORT:-9091}:9091"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - outbox
    restart: unless-stopped

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  outbox:
    driver: bridge
