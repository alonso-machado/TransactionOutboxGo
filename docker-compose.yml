# Phase 3: shared shape for the per-method consumer-worker services below —
# each binds via PAYMENT_QUEUE to exactly one RabbitMQ queue
# (internal/infrastructure/rabbitmq.QueueFor), decoupling payment methods
# from consumer scaling.
x-consumer-worker-base: &consumer-worker-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      SERVICE: consumer-worker
  # jaeger is NOT a dependency here — the OTLP/HTTP exporter
  # (internal/infrastructure/telemetry) fails open if nothing's listening at
  # OTEL_EXPORTER_OTLP_ENDPOINT (traces are just dropped, not fatal), so a
  # partial `up` that skips jaeger (see `make loadtest-up`) still works.
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks:
    - outbox
  restart: unless-stopped

x-consumer-worker-env: &consumer-worker-env
  DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
  RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
  PREFETCH_COUNT: "${CONSUMER_PREFETCH:-10}"
  MAX_DELIVERIES: "${RABBITMQ_MAX_REDELIVERIES:-5}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4318}"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-outbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outbox}
      POSTGRES_DB:       ${POSTGRES_DB:-outbox}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outbox} -d ${POSTGRES_DB:-outbox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  rabbitmq:
    image: rabbitmq:4.3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      - outbox

  # ── Application services ────────────────────────────────────────────────────

  ingestion-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: ingestion-api
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      HTTP_PORT: "${APP_PORT:-8080}"
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-true}"
      OUTBOX_DISPATCH_INTERVAL_MS: "${OUTBOX_DISPATCH_INTERVAL_MS:-500}"
      OUTBOX_DISPATCH_BATCH_SIZE: "${OUTBOX_DISPATCH_BATCH_SIZE:-50}"
      OUTBOX_MAX_RETRIES: "${OUTBOX_MAX_RETRIES:-5}"
      OUTBOX_PRUNE_AFTER_HOURS: "${OUTBOX_PRUNE_AFTER_HOURS:-48}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-ingestion-api}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4318}"
      METRICS_PORT: "${METRICS_PORT:-9090}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_RATE: "${RATE_LIMIT_RATE:-50}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-100}"
      # Empty locally: no ALB in front of compose, so c.ClientIP() falls back
      # to the direct RemoteAddr (correct without an XFF-injecting proxy).
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    # jaeger is NOT a dependency here — see consumer-worker's note above;
    # this lets `make loadtest-up` bring up a minimal subset of this same
    # compose file without dragging Jaeger along.
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # One consumer-worker service per payment method (Phase 3 Track 1) — each
  # sets PAYMENT_QUEUE so it binds to and drains exactly one queue. `make seed`/
  # `seed-pix`/`seed-boleto`/`seed-transfer` post to ingestion-api, which fans
  # out to whichever of these queues matches the payment's method.
  consumer-pix:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.pix.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-pix"
      METRICS_PORT: "9091"
    ports:
      - "9091:9091"

  consumer-boleto:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.boleto.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-boleto"
      METRICS_PORT: "9092"
    ports:
      - "9092:9092"

  consumer-transfer:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.transfer.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-transfer"
      METRICS_PORT: "9093"
    ports:
      - "9093:9093"

  consumer-cartao-credito:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.cartao_credito.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-cartao-credito"
      METRICS_PORT: "9094"
    ports:
      - "9094:9094"

  consumer-cartao-debito:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.cartao_debito.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-cartao-debito"
      METRICS_PORT: "9095"
    ports:
      - "9095:9095"

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  outbox:
    driver: bridge
