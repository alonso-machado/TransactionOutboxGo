# Phase 3: shared shape for the per-method consumer-worker services below —
# each binds via PAYMENT_QUEUE to exactly one RabbitMQ queue
# (internal/infrastructure/rabbitmq.QueueFor), decoupling payment methods
# from consumer scaling.
x-consumer-worker-base: &consumer-worker-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      SERVICE: consumer-worker
  # tempo is NOT a dependency here — the OTLP/HTTP exporter
  # (internal/infrastructure/telemetry) fails open if nothing's listening at
  # OTEL_EXPORTER_OTLP_ENDPOINT (traces are just dropped, not fatal), so a
  # partial `up` that skips tempo (see `make loadtest-up`) still works.
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
    pgbouncer:
      condition: service_healthy
  networks:
    - outbox
  restart: unless-stopped

x-consumer-worker-env: &consumer-worker-env
  # Phase 5 Track 3.B — points at PgBouncer (transaction-pooling mode), not
  # postgres directly, so the 0..N-per-method KEDA fan-out's many short-lived
  # connections collapse onto a small server-side pool instead of each pod
  # opening its own GORM pool straight against Postgres.
  DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/${POSTGRES_DB:-outbox}?sslmode=disable"
  RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
  PREFETCH_COUNT: "${CONSUMER_PREFETCH:-10}"
  MAX_DELIVERIES: "${RABBITMQ_MAX_REDELIVERIES:-5}"
  RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
  RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
  # Phase 5 Track 4.B: traces now land in Tempo instead of Jaeger — same
  # OTLP/HTTP protocol, just a different receiver container. The Go config
  # default (internal/infrastructure/config) stays the bare "localhost:4318";
  # compose always overrides it, same pattern as before.
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
  LOG_FORMAT: "${LOG_FORMAT:-json}"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    # Phase 4 Track 2: TimescaleDB's own Postgres-18 image ships the
    # extension preloaded via shared_preload_libraries — plain postgres
    # can't run `CREATE EXTENSION timescaledb` at all. Same env vars/healthcheck
    # as before, drop-in replacement. Timescale's tag tracks the PG MAJOR
    # version only (pg18), not the exact minor (18.4) — "latest-pg18" always
    # resolves to the current minor patch of PG 18.
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-outbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outbox}
      POSTGRES_DB:       ${POSTGRES_DB:-outbox}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18+ images store data in a pg_ctlcluster-compatible,
      # major-version-specific subdirectory layout and refuse to start at all
      # (even against an empty volume) if anything is mounted at the old
      # single-version path /var/lib/postgresql/data — the single mount point
      # must be the parent /var/lib/postgresql instead.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outbox} -d ${POSTGRES_DB:-outbox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  rabbitmq:
    image: rabbitmq:4.3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    # rabbitmq_prometheus ships in the image but isn't enabled by default on
    # the -management tag — enable it before the server starts (Track 3).
    command: >
      bash -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
               exec rabbitmq-server"
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
      - "${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/90-prometheus.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  # Phase 5 Track 4.B: replaces the Jaeger all-in-one container. Traces land
  # in the same Grafana as the Phase 4 dashboards and the Track 4.A Loki
  # logs, giving native trace<->logs<->metrics correlation instead of a
  # separate Jaeger UI.
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"     # Tempo HTTP API (Grafana datasource talks to this)
      - "4318:4318"     # OTLP HTTP receiver
      - "4317:4317"     # OTLP gRPC receiver
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 1: one-shot golang-migrate container that applies
  # migrations/*.up.sql before any app service starts — replaces the
  # AutoMigrate/MigrateTimescale boot-time calls that used to live in
  # cmd/ingestion-api/main.go and cmd/consumer-worker/main.go. Exits 0 (or
  # a no-op if already at the latest version) and the container is left in
  # "Exited" state, which `depends_on: condition: service_completed_successfully`
  # below waits on.
  migrate:
    image: migrate/migrate:latest
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      - migrate
      - -path=/migrations
      - -database
      - "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbox

  # Phase 5 Track 3.B — PgBouncer in transaction-pooling mode, in front of
  # Postgres. Identical local/cloud topology (see
  # helmcharts/transaction-outbox/templates/pgbouncer/): both ingestion-api
  # and every per-method consumer-worker point DATABASE_URL here instead of
  # at postgres directly, so the KEDA fan-out's many short-lived sessions
  # collapse onto a small pool of real Postgres connections. GORM's
  # PrepareStmt is disabled (internal/infrastructure/database/database.go)
  # because transaction-mode pooling doesn't guarantee the same server
  # connection across statements.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./observability/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./observability/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-outbox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  # Phase 5 Track 3.C — exposes PgBouncer's admin pseudo-database (SHOW
  # STATS/SHOW POOLS) as Prometheus metrics on :9127. Track 4 wires this into
  # observability/prometheus/prometheus.yml's scrape config and adds a
  # PgBouncer row to observability/grafana/dashboards/infra.json — this
  # service just needs to run and be reachable for that to land later.
  pgbouncer-exporter:
    image: quay.io/prometheuscommunity/pgbouncer-exporter:latest
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer
      PGBOUNCER_EXPORTER_PORT: "6432"
      PGBOUNCER_EXPORTER_USER: "${POSTGRES_USER:-outbox}"
      PGBOUNCER_EXPORTER_PASSWORD: "${POSTGRES_PASSWORD:-outbox}"
      DATA_SOURCE_NAME: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/pgbouncer?sslmode=disable"
    ports:
      - "9127:9127"
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # ── Application services ────────────────────────────────────────────────────

  ingestion-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: ingestion-api
    environment:
      # Phase 5 Track 3.B — points at PgBouncer, not postgres directly (see
      # the pgbouncer service above and consumer-worker-env's note).
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/${POSTGRES_DB:-outbox}?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      HTTP_PORT: "${APP_PORT:-8080}"
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-true}"
      OUTBOX_DISPATCH_INTERVAL_MS: "${OUTBOX_DISPATCH_INTERVAL_MS:-250}"
      OUTBOX_DISPATCH_BATCH_SIZE: "${OUTBOX_DISPATCH_BATCH_SIZE:-100}"
      OUTBOX_MAX_RETRIES: "${OUTBOX_MAX_RETRIES:-5}"
      OUTBOX_PRUNE_AFTER_HOURS: "${OUTBOX_PRUNE_AFTER_HOURS:-48}"
      RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
      RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-ingestion-api}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
      METRICS_PORT: "${METRICS_PORT:-9090}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      # Off by default locally — k6 load tests and seed scripts hit this from
      # a single source IP and would otherwise get throttled by their own
      # traffic. Cloud (Helm values) sets this true explicitly.
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      RATE_LIMIT_RATE: "${RATE_LIMIT_RATE:-50}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-100}"
      # Empty locally: no ALB in front of compose, so c.ClientIP() falls back
      # to the direct RemoteAddr (correct without an XFF-injecting proxy).
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    # tempo is NOT a dependency here — see consumer-worker's note above;
    # this lets `make loadtest-up` bring up a minimal subset of this same
    # compose file without dragging Tempo along.
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # One consumer-worker service per payment method (Phase 3 Track 1) — each
  # sets PAYMENT_QUEUE so it binds to and drains exactly one queue. `make seed`/
  # `seed-pix`/`seed-boleto`/`seed-transfer` post to ingestion-api, which fans
  # out to whichever of these queues matches the payment's method.
  consumer-pix:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.pix.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-pix"
      METRICS_PORT: "9091"
    ports:
      - "9091:9091"

  # A second instance bound to the SAME queue as consumer-pix — RabbitMQ
  # round-robins payments.pix.queue's deliveries between the two (the
  # competing-consumers pattern), letting a load test compare 2 consumers'
  # combined drain rate against consumer-transfer's single instance to see
  # whether Postgres/PgBouncer becomes the bottleneck before consumer count
  # does. Not part of the normal topology — only bring this up for that
  # specific load test (loadtest/README.md's 6.3).
  #
  # Named "-extra", not "-2": this is a second, separately-named service,
  # not a true `--scale consumer-pix=2` replica — consumer-pix's host port
  # (9091) is fixed (every other consumer-* service follows the same
  # documented fixed-port convention, see README.md's METRICS_PORT row),
  # and two replicas of one service can't both bind the same host port.
  # A name ending in a digit would also collide visually with Compose's own
  # container suffix (every service gets "-1" appended, scaled or not), so
  # "consumer-pix-2" would render as the confusing "consumer-pix-2-1".
  consumer-pix-extra:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.pix.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-pix-extra"
      METRICS_PORT: "9097"
    ports:
      - "9097:9097"

  consumer-boleto:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.boleto.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-boleto"
      METRICS_PORT: "9092"
    ports:
      - "9092:9092"

  consumer-transfer:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.transfer.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-transfer"
      METRICS_PORT: "9093"
    ports:
      - "9093:9093"

  consumer-cartao-credito:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.cartao_credito.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-cartao-credito"
      METRICS_PORT: "9094"
    ports:
      - "9094:9094"

  consumer-cartao-debito:
    <<: *consumer-worker-base
    environment:
      <<: *consumer-worker-env
      PAYMENT_QUEUE: "payments.cartao_debito.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-consumer-worker}-cartao-debito"
      METRICS_PORT: "9095"
    ports:
      - "9095:9095"

  # ── Observability (Phase 4 Track 3) ───────────────────────────────────────

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
    command:
      - "--extend.query-path=/etc/postgres-exporter/queries.yaml"
    volumes:
      - ./observability/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9096:9090"
    depends_on:
      - alertmanager
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 4.C — receives firing alerts from Prometheus and routes
  # them to the configured receiver. See
  # observability/alertmanager/alertmanager.yml for the (placeholder)
  # webhook target.
  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 4.A — log aggregation. Promtail (below) ships every
  # container's structured JSON stdout here; Grafana's Loki datasource
  # (observability/grafana/provisioning/datasources/loki.yml) reads it back
  # and derived-field-links trace_id into Tempo.
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 4.A — scrapes every other container's stdout via the
  # engine's Docker-compatible API and pushes to Loki. The socket mount below
  # assumes a Docker Desktop-style /var/run/docker.sock; if you're on a
  # Podman setup where that path isn't present on the host, point this at
  # your Podman machine's own socket instead (see the long comment in
  # observability/promtail/promtail-config.yaml for exact paths per
  # platform), e.g.:
  #   - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - outbox
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - outbox
    restart: unless-stopped

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
  alertmanager_data:

networks:
  outbox:
    driver: bridge
