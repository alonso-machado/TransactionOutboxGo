# Shared shape for the order-consumer-worker/fulfillment-consumer-worker services below — each
# binds via CONSUMER_QUEUE to exactly one RabbitMQ shard queue
# (internal/infrastructure/rabbitmq.QueueFor), decoupling event types from
# consumer scaling. Only a small representative subset of the full
# (event_type, event_subtype) registry runs locally by default — add more
# following the same pattern (a new CONSUMER_QUEUE + METRICS_PORT pair) to
# exercise another shard.
x-order-consumer-worker-base: &order-consumer-worker-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      SERVICE: order-consumer-worker
  # tempo is NOT a dependency here — the OTLP/HTTP exporter
  # (internal/infrastructure/telemetry) fails open if nothing's listening at
  # OTEL_EXPORTER_OTLP_ENDPOINT (traces are just dropped, not fatal), so a
  # partial `up` that skips tempo (see `make loadtest-up`) still works.
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    migrate-events:
      condition: service_completed_successfully
    pgbouncer:
      condition: service_healthy
  networks:
    - outbox
  restart: unless-stopped

x-order-consumer-worker-env: &order-consumer-worker-env
  # Points at PgBouncer (transaction-pooling mode), not postgres directly, so
  # the per-shard KEDA fan-out's many short-lived connections collapse onto a
  # small server-side pool instead of each pod opening its own GORM pool
  # straight against Postgres.
  #
  # Two-DB split: order-consumer-worker/fulfillment-consumer-worker are the only writers of the
  # events domain, so they point at the `events` database (PgBouncer's
  # wildcard [databases] entry transparently pools whichever dbname the
  # client requests).
  DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/events?sslmode=disable"
  RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
  PREFETCH_COUNT: "${CONSUMER_PREFETCH:-10}"
  MAX_DELIVERIES: "${RABBITMQ_MAX_REDELIVERIES:-5}"
  RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
  RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
  # PAYMENT_PROVIDER selects the domain.PaymentGateway adapter order-consumer-worker
  # opens checkouts through — "fake" (default, no network) locally.
  PAYMENT_PROVIDER: "${PAYMENT_PROVIDER:-fake}"
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
  CHECKOUT_SUCCESS_URL: "${CHECKOUT_SUCCESS_URL:-http://localhost:8080/orders/success}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
  LOG_FORMAT: "${LOG_FORMAT:-json}"

x-fulfillment-consumer-worker-base: &fulfillment-consumer-worker-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      SERVICE: fulfillment-consumer-worker
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    migrate-events:
      condition: service_completed_successfully
    pgbouncer:
      condition: service_healthy
  networks:
    - outbox
  restart: unless-stopped

x-fulfillment-consumer-worker-env: &fulfillment-consumer-worker-env
  DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/events?sslmode=disable"
  RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
  PREFETCH_COUNT: "${CONSUMER_PREFETCH:-10}"
  MAX_DELIVERIES: "${RABBITMQ_MAX_REDELIVERIES:-5}"
  RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
  RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
  # HMAC key internal/adapter/ticketqr signs every issued ticket's
  # validation code with — a fixed dev default here, a real secret via Helm
  # in cloud.
  TICKET_SIGNING_SECRET: "${TICKET_SIGNING_SECRET:-dev-ticket-signing-secret}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
  LOG_FORMAT: "${LOG_FORMAT:-json}"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    # Phase 4 Track 2: TimescaleDB's own Postgres-18 image ships the
    # extension preloaded via shared_preload_libraries — plain postgres
    # can't run `CREATE EXTENSION timescaledb` at all. Same env vars/healthcheck
    # as before, drop-in replacement. Timescale's tag tracks the PG MAJOR
    # version only (pg18), not the exact minor (18.4) — "latest-pg18" always
    # resolves to the current minor patch of PG 18.
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-outbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outbox}
      POSTGRES_DB:       ${POSTGRES_DB:-outbox}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18+ images store data in a pg_ctlcluster-compatible,
      # major-version-specific subdirectory layout and refuse to start at all
      # (even against an empty volume) if anything is mounted at the old
      # single-version path /var/lib/postgresql/data — the single mount point
      # must be the parent /var/lib/postgresql instead.
      - postgres_data:/var/lib/postgresql
      # Creates the second logical database (`events`) on a fresh data dir,
      # alongside the image-created `outbox` (POSTGRES_DB). Runs once, only
      # when the volume is empty — `make down` (-v) wipes the volume so the
      # next `up` re-runs it. See the file's own comment for the two-DB split.
      - ./observability/postgres/init-events.sql:/docker-entrypoint-initdb.d/init-events.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outbox} -d ${POSTGRES_DB:-outbox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  rabbitmq:
    image: rabbitmq:4.3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    # rabbitmq_prometheus ships in the image but isn't enabled by default on
    # the -management tag — enable it before the server starts (Track 3).
    command: >
      bash -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
               exec rabbitmq-server"
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
      - "${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/90-prometheus.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  # Phase 5 Track 4.B: replaces the Jaeger all-in-one container. Traces land
  # in the same Grafana as the Phase 4 dashboards and the Track 4.A Loki
  # logs, giving native trace<->logs<->metrics correlation instead of a
  # separate Jaeger UI.
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"     # Tempo HTTP API (Grafana datasource talks to this)
      - "4318:4318"     # OTLP HTTP receiver
      - "4317:4317"     # OTLP gRPC receiver
    networks:
      - outbox
    restart: unless-stopped

  # One-shot golang-migrate containers that apply migrations/<set>/*.up.sql
  # before any app service starts. Each exits 0 (or a no-op if already at
  # the latest version) and is left in "Exited" state, which
  # `depends_on: condition: service_completed_successfully` below waits on.
  #
  # Two sets now, one per logical database (the outbox/events split): the
  # two outbox tables + their notify trigger/indexes go to the `outbox` DB,
  # the events domain (locations/events/orders/tickets/charges) go to the
  # `events` DB created by observability/postgres/init-events.sql.
  # golang-migrate tracks its own schema_migrations table per database, so
  # these run independently.
  migrate-outbox:
    image: migrate/migrate:latest
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      - migrate
      - -path=/migrations/outbox
      - -database
      - "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbox

  migrate-events:
    image: migrate/migrate:latest
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      - migrate
      - -path=/migrations/events
      - -database
      - "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/events?sslmode=disable"
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbox

  # PgBouncer in transaction-pooling mode, in front of Postgres. Identical
  # local/cloud topology (see helmcharts/transaction-outbox/templates/pgbouncer/):
  # every service (ingestion-api and each order-consumer-worker/fulfillment-consumer-worker
  # shard) points DATABASE_URL here instead of at postgres directly, so the
  # KEDA fan-out's many short-lived sessions collapse onto a small pool of
  # real Postgres connections. GORM's
  # PrepareStmt is disabled (internal/infrastructure/database/database.go)
  # because transaction-mode pooling doesn't guarantee the same server
  # connection across statements.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./observability/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./observability/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-outbox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox

  # Phase 5 Track 3.C — exposes PgBouncer's admin pseudo-database (SHOW
  # STATS/SHOW POOLS) as Prometheus metrics on :9127. Track 4 wires this into
  # observability/prometheus/prometheus.yml's scrape config and adds a
  # PgBouncer row to observability/grafana/dashboards/infra.json — this
  # service just needs to run and be reachable for that to land later.
  pgbouncer-exporter:
    image: quay.io/prometheuscommunity/pgbouncer-exporter:latest
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer
      PGBOUNCER_EXPORTER_PORT: "6432"
      PGBOUNCER_EXPORTER_USER: "${POSTGRES_USER:-outbox}"
      PGBOUNCER_EXPORTER_PASSWORD: "${POSTGRES_PASSWORD:-outbox}"
      DATA_SOURCE_NAME: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/pgbouncer?sslmode=disable"
    ports:
      - "9127:9127"
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # ── Application services ────────────────────────────────────────────────────

  ingestion-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: ingestion-api
    environment:
      # Phase 5 Track 3.B — points at PgBouncer, not postgres directly (see
      # the pgbouncer service above). Two-DB split: ingestion-api only writes
      # the outbox table, so it points at the `outbox` database (POSTGRES_DB).
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/${POSTGRES_DB:-outbox}?sslmode=disable"
      # Still provided because the shared Config struct marks RABBITMQ_URL
      # required — but ingestion-api no longer connects to RabbitMQ at all
      # (the relay is now outbox-worker). It's also why this service no longer
      # depends_on rabbitmq below: it can boot and accept writes with the
      # broker down, which is the whole point of the outbox.
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      HTTP_PORT: "${APP_PORT:-8080}"
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-true}"
      RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
      RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-ingestion-api}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
      METRICS_PORT: "${METRICS_PORT:-9090}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      # Off by default locally — k6 load tests and seed scripts hit this from
      # a single source IP and would otherwise get throttled by their own
      # traffic. Cloud (Helm values) sets this true explicitly.
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      RATE_LIMIT_RATE: "${RATE_LIMIT_RATE:-50}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-100}"
      # Empty locally: no ALB in front of compose, so c.ClientIP() falls back
      # to the direct RemoteAddr (correct without an XFF-injecting proxy).
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
      # ingestion-api needs its own PaymentGateway instance too — VerifyWebhook
      # is called straight from the webhook handler, not via order-consumer-worker.
      PAYMENT_PROVIDER: "${PAYMENT_PROVIDER:-fake}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    # tempo is NOT a dependency here — the OTLP/HTTP exporter fails open if
    # nothing's listening at OTEL_EXPORTER_OTLP_ENDPOINT (traces are just
    # dropped, not fatal), so `make loadtest-up` can bring up a minimal subset
    # of this same compose file without dragging Tempo along. rabbitmq is
    # intentionally NOT a dependency either — ingestion-api never connects to
    # it now.
    depends_on:
      postgres:
        condition: service_healthy
      migrate-outbox:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # Phase 8: synchronous REST reading/writing the events DB directly (order
  # status/checkout URL, ticket check-in, ticket-holder name update) — the
  # mirror image of ingestion-api (which touches outbox+broker but never
  # events; this touches events but never outbox/broker).
  tickets-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: tickets-api
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/events?sslmode=disable"
      # Still provided because the shared Config struct marks RABBITMQ_URL
      # required — tickets-api never connects to RabbitMQ (purely
      # synchronous REST against events), same "provide but ignore"
      # precedent ingestion-api sets.
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      HTTP_PORT: "${TICKETS_API_PORT:-8081}"
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-true}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-tickets-api}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
      METRICS_PORT: "${TICKETS_API_METRICS_PORT:-9095}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      RATE_LIMIT_RATE: "${RATE_LIMIT_RATE:-50}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-100}"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
      TICKET_SIGNING_SECRET: "${TICKET_SIGNING_SECRET:-dev-ticket-signing-secret}"
      # fake locally — make up/tests don't need a real Clerk account.
      STAFF_AUTH_PROVIDER: "${STAFF_AUTH_PROVIDER:-fake}"
      STAFF_AUTH_FAKE_TOKEN: "${STAFF_AUTH_FAKE_TOKEN:-dev-staff-token}"
      STAFF_AUTH_FAKE_CLERK_USER_ID: "${STAFF_AUTH_FAKE_CLERK_USER_ID:-dev-staff-user}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY:-}"
    ports:
      - "${TICKETS_API_PORT:-8081}:${TICKETS_API_PORT:-8081}"
      - "${TICKETS_API_METRICS_PORT:-9095}:${TICKETS_API_METRICS_PORT:-9095}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate-events:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # The Transactional Outbox relay (DispatchOutbox), run once for each of the
  # two outboxes (order_outbox, payment_event_outbox). It is the only reader
  # of either outbox table and the only publisher to RabbitMQ; it also
  # declares the shared topology that order-consumer-worker/fulfillment-consumer-worker consume
  # from. Points at the `outbox` database, same as ingestion-api.
  outbox-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: outbox-worker
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/${POSTGRES_DB:-outbox}?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      OUTBOX_DISPATCH_INTERVAL_MS: "${OUTBOX_DISPATCH_INTERVAL_MS:-250}"
      OUTBOX_DISPATCH_BATCH_SIZE: "${OUTBOX_DISPATCH_BATCH_SIZE:-100}"
      OUTBOX_MAX_RETRIES: "${OUTBOX_MAX_RETRIES:-5}"
      OUTBOX_PRUNE_AFTER_HOURS: "${OUTBOX_PRUNE_AFTER_HOURS:-48}"
      RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
      RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-outbox-worker}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
      METRICS_PORT: "9098"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
    ports:
      - "9098:9098"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate-outbox:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # One order-consumer-worker + one fulfillment-consumer-worker per (event_type, event_subtype)
  # shard actually exercised locally — each sets CONSUMER_QUEUE so it binds
  # to and drains exactly one queue. Only two shards run by default
  # (CONCERT/ROCK, SPORTS/FOOTBALL); add more following the same pattern (a
  # new CONSUMER_QUEUE + METRICS_PORT pair) to exercise another registry
  # entry (internal/infrastructure/rabbitmq.EventTypes).
  order-consumer-worker-concert-rock:
    <<: *order-consumer-worker-base
    environment:
      <<: *order-consumer-worker-env
      CONSUMER_QUEUE: "events.concert.rock.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-order-consumer-worker}-concert-rock"
      METRICS_PORT: "9091"
    ports:
      - "9091:9091"

  order-consumer-worker-sports-football:
    <<: *order-consumer-worker-base
    environment:
      <<: *order-consumer-worker-env
      CONSUMER_QUEUE: "events.sports.football.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-order-consumer-worker}-sports-football"
      METRICS_PORT: "9092"
    ports:
      - "9092:9092"

  fulfillment-consumer-worker-concert-rock:
    <<: *fulfillment-consumer-worker-base
    environment:
      <<: *fulfillment-consumer-worker-env
      CONSUMER_QUEUE: "payments.concert.rock.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-fulfillment-consumer-worker}-concert-rock"
      METRICS_PORT: "9093"
    ports:
      - "9093:9093"

  fulfillment-consumer-worker-sports-football:
    <<: *fulfillment-consumer-worker-base
    environment:
      <<: *fulfillment-consumer-worker-env
      CONSUMER_QUEUE: "payments.sports.football.queue"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-fulfillment-consumer-worker}-sports-football"
      METRICS_PORT: "9094"
    ports:
      - "9094:9094"

  # Phase 8: sends an issued ticket's QR by email, consuming
  # ticket_notification_outbox's single unsharded queue — one instance, not
  # a shard pair like order/fulfillment above (see
  # internal/infrastructure/rabbitmq.NotificationStream's doc comment).
  notification-consumer-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: notification-consumer-worker
    environment:
      # Unused (usecase/notification.SendNotification never queries a
      # database) but config.Config's DatabaseURL carries a shared
      # required:"true" tag — same "provide but ignore" precedent
      # ingestion-api sets for its own unused RABBITMQ_URL.
      DATABASE_URL: "postgres://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@pgbouncer:6432/events?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"
      PREFETCH_COUNT: "${CONSUMER_PREFETCH:-10}"
      MAX_DELIVERIES: "${RABBITMQ_MAX_REDELIVERIES:-5}"
      RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-1s}"
      RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-5m}"
      # fake locally — no SMTP server running in compose; fake makes no
      # network calls at all, so no mailhog/maildev catcher is required.
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-fake}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-tickets@example.com}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Event Tickets}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-notification-consumer-worker}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4318}"
      METRICS_PORT: "9096"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
    ports:
      - "9096:9096"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate-events:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  # ── Observability (Phase 4 Track 3) ───────────────────────────────────────

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-outbox}:${POSTGRES_PASSWORD:-outbox}@postgres:5432/${POSTGRES_DB:-outbox}?sslmode=disable"
    command:
      - "--extend.query-path=/etc/postgres-exporter/queries.yaml"
    volumes:
      - ./observability/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbox
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9096:9090"
    depends_on:
      - alertmanager
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 4.C — receives firing alerts from Prometheus and routes
  # them to the configured receiver. See
  # observability/alertmanager/alertmanager.yml for the (placeholder)
  # webhook target.
  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 4.A — log aggregation. Promtail (below) ships every
  # container's structured JSON stdout here; Grafana's Loki datasource
  # (observability/grafana/provisioning/datasources/loki.yml) reads it back
  # and derived-field-links trace_id into Tempo.
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - outbox
    restart: unless-stopped

  # Phase 5 Track 4.A — scrapes every other container's stdout via the
  # engine's Docker-compatible API and pushes to Loki. The socket mount below
  # assumes a Docker Desktop-style /var/run/docker.sock; if you're on a
  # Podman setup where that path isn't present on the host, point this at
  # your Podman machine's own socket instead (see the long comment in
  # observability/promtail/promtail-config.yaml for exact paths per
  # platform), e.g.:
  #   - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - outbox
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - outbox
    restart: unless-stopped

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
  alertmanager_data:

networks:
  outbox:
    driver: bridge
