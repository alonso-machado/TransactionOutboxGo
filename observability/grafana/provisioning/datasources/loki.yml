apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # Derived field: any "trace_id":"<id>" found in a log line (the JSON
      # slog handler — internal/infrastructure/logging — always emits one
      # when called with a context carrying an active span) becomes a link
      # that jumps straight into the matching Tempo trace.
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "\"trace_id\":\"(\\w+)\""
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace"
