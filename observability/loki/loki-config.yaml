# Minimal single-binary Loki config for local dev (Phase 5 Track 4.A).
# All data lives on the loki_data volume (docker-compose.yml) — fine for a
# showcase/local stack, not tuned for production retention/scale.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Promtail (observability/promtail/promtail-config.yaml) pushes here over
# HTTP at /loki/api/v1/push.
limits_config:
  allow_structured_metadata: true
  volume_enabled: true

ruler:
  alertmanager_url: http://alertmanager:9093
