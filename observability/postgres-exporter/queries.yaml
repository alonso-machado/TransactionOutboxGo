# Custom queries for quay.io/prometheuscommunity/postgres-exporter, loaded via
# --extend.query-path. The exporter's built-in collectors already cover
# everything the infra dashboard needs (pg_stat_database_*, pg_stat_bgwriter_*,
# pg_stat_activity_count, pg_stat_activity_max_tx_duration,
# pg_settings_max_connections, pg_locks_count, pg_database_size_bytes) — this
# file is kept as the place to add Timescale-specific queries once Track 2 lands.

# Phase 4 Track 2 (TimescaleDB) adds per-method hypertables — once that
# migration lands, uncomment to surface chunk count / compression ratio on
# the infra dashboard:
#
# timescaledb_chunks_total:
#   query: "SELECT hypertable_name, count(*) AS chunks FROM timescaledb_information.chunks GROUP BY hypertable_name"
#   metrics:
#     - hypertable_name:
#         usage: "LABEL"
#         description: "Hypertable name"
#     - chunks:
#         usage: "GAUGE"
#         description: "Number of chunks for this hypertable"
