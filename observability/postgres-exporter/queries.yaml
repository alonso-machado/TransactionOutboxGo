# Custom queries for quay.io/prometheuscommunity/postgres-exporter, loaded via
# --extend.query-path. The exporter's built-in collectors already cover
# everything else the infra dashboard needs (pg_stat_database_*,
# pg_stat_bgwriter_*, pg_stat_activity_count, pg_stat_activity_max_tx_duration,
# pg_settings_max_connections, pg_locks_count, pg_database_size_bytes).
#
# Metric names get the column name appended (query key "foo" + column "bar"
# -> "pg_foo_bar"), so "timescaledb_chunks_total" + column "chunks" below
# becomes "timescaledb_chunks_total_chunks" (matches observability/grafana/
# dashboards/infra.json's panel query).
timescaledb_chunks_total:
  query: "SELECT hypertable_name, count(*) AS chunks FROM timescaledb_information.chunks GROUP BY hypertable_name"
  metrics:
    - hypertable_name:
        usage: "LABEL"
        description: "Hypertable name"
    - chunks:
        usage: "GAUGE"
        description: "Number of chunks for this hypertable"
