# Phase 5 Track 3.B — PgBouncer config, transaction-pooling mode.
#
# transaction mode hands a server connection to a client only for the
# duration of one transaction, then returns it to the pool — this is what
# collapses the KEDA fan-out's many short-lived consumer-worker connections
# (0..N pods per method, 5 methods) plus ingestion-api's HPA replicas onto a
# small, bounded number of real Postgres connections.
#
# Caveat this config exists to honor: transaction mode is incompatible with
# server-side prepared statements that span more than one transaction (a
# later transaction can land on a different server connection). GORM's
# PrepareStmt is disabled application-side
# (internal/infrastructure/database/database.go) to stay safe here.
[databases]
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
# plain here (not scram-sha-256) deliberately: userlist.txt's password would
# otherwise need to be the exact SCRAM verifier Postgres computed for this
# user, which can't be hand-written into a static checked-in file. Local-dev
# tradeoff only — the cloud target authenticates PgBouncer the same way
# (Helm chart secret), and a real deployment with rotated creds should
# generate userlist.txt from `SELECT rolpassword FROM pg_authid` or use
# PgBouncer's auth_query against Postgres instead of a static file.
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
admin_users = outbox
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
# PgBouncer >= 1.21 supports prepared statements natively even in
# transaction mode (via this), but we keep GORM's own PrepareStmt disabled
# regardless — belt and suspenders, and it stays correct if PgBouncer is
# ever swapped for a version/build without this feature.
max_prepared_statements = 100
