global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: ingestion-api
    static_configs:
      - targets: ["ingestion-api:9090"]
        labels:
          service: ingestion-api

  # One target per per-method consumer-worker (Phase 3 Track 1) — each binds
  # to a fixed metrics port (see docker-compose.yml). The "method" label lets
  # the consumer-worker dashboard's $method template variable isolate one
  # payment method's throughput/retry/poison rate from the others.
  - job_name: consumer-worker
    static_configs:
      - targets: ["consumer-pix:9091"]
        labels: { service: consumer-worker, method: PIX }
      - targets: ["consumer-boleto:9092"]
        labels: { service: consumer-worker, method: BOLETO }
      - targets: ["consumer-transfer:9093"]
        labels: { service: consumer-worker, method: TRANSFER }
      - targets: ["consumer-cartao-credito:9094"]
        labels: { service: consumer-worker, method: CARTAO_CREDITO }
      - targets: ["consumer-cartao-debito:9095"]
        labels: { service: consumer-worker, method: CARTAO_DEBITO }

  # RabbitMQ's built-in Prometheus plugin (rabbitmq_prometheus) — enabled via
  # the rabbitmq service's command override in docker-compose.yml.
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: rabbitmq

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]
        labels:
          service: postgres
