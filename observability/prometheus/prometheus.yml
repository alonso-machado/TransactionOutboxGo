global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Phase 5 Track 4.C — alert rules + where to send firing alerts.
rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: ingestion-api
    static_configs:
      - targets: ["ingestion-api:9090"]
        labels:
          service: ingestion-api

  # The Transactional Outbox relay — its own process, running both
  # DispatchOutbox loops (order_outbox + payment_event_outbox) on one shared
  # metrics port (see docker-compose.yml's outbox-worker service).
  - job_name: outbox-worker
    static_configs:
      - targets: ["outbox-worker:9098"]
        labels:
          service: outbox-worker

  # One target per (event_type, event_subtype) shard's order-consumer-worker
  # instance — each binds to a fixed metrics port (see docker-compose.yml).
  # The event_type/event_subtype labels let the order-consumer-worker
  # dashboard's $event_type/$event_subtype template variables isolate one
  # shard's throughput/retry/poison rate from the others.
  - job_name: order-consumer-worker
    static_configs:
      - targets: ["order-consumer-worker-concert-rock:9091"]
        labels: { service: order-consumer-worker, event_type: CONCERT, event_subtype: ROCK }
      - targets: ["order-consumer-worker-sports-football:9092"]
        labels: { service: order-consumer-worker, event_type: SPORTS, event_subtype: FOOTBALL }

  # Same shape as order-consumer-worker above, for the fulfillment side
  # (payment_event_outbox consumers).
  - job_name: fulfillment-consumer-worker
    static_configs:
      - targets: ["fulfillment-consumer-worker-concert-rock:9093"]
        labels: { service: fulfillment-consumer-worker, event_type: CONCERT, event_subtype: ROCK }
      - targets: ["fulfillment-consumer-worker-sports-football:9094"]
        labels: { service: fulfillment-consumer-worker, event_type: SPORTS, event_subtype: FOOTBALL }

  # RabbitMQ's built-in Prometheus plugin (rabbitmq_prometheus) — enabled via
  # the rabbitmq service's command override in docker-compose.yml.
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: rabbitmq

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]
        labels:
          service: postgres

  # Phase 5 Track 4.D — PgBouncer pool metrics, feeding the infra.json
  # dashboard's PgBouncer row + the PgBouncerClientsWaiting alert
  # (rules/alerts.yml). The pgbouncer-exporter container itself is a Track
  # 3.C addition (docker-compose.yml).
  - job_name: pgbouncer
    static_configs:
      - targets: ["pgbouncer-exporter:9127"]
        labels: { service: pgbouncer }
